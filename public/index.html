  main.appendChild(resultsArea);
  return main;
}

function renderAPIResults(container) {
  const r = apiState.results;
  container.innerHTML = '';

  // Stats bar
  const statsBar = h('div',{style:{display:'flex',alignItems:'center',gap:'12px',padding:'10px 24px',borderBottom:'1px solid var(--border)',fontSize:'12px',background:'var(--bg2)'}});
  statsBar.appendChild(h('span',{style:{color:'var(--green)',fontWeight:700,fontFamily:'monospace',fontSize:'14px'}},fmt(r.elapsed)));
  statsBar.appendChild(h('span',{style:{color:'var(--fg2)'}},r.bytes + ' bytes'));
  statsBar.appendChild(h('span',{style:{color:'var(--fg3)'}},'~' + Math.ceil(r.bytes/4) + ' tokens'));
  statsBar.appendChild(h('span',{style:{color:IMPLS[r.impl]?.color||'var(--fg3)',fontWeight:600}},(IMPLS[r.impl]?.icon||'') + ' ' + (r.impl||'node')));
  container.appendChild(statsBar);

  // Text results — render as pre-formatted
  const code = h('pre',{style:{padding:'16px 24px',fontSize:'12px',fontFamily:'JetBrains Mono,monospace',lineHeight:'1.6',color:'var(--fg2)',whiteSpace:'pre-wrap',margin:0}});
  code.textContent = r.text || 'No results';
  container.appendChild(code);
}

function renderAPIRaceResults(container) {
  container.innerHTML = '';
  const results = apiState.raceResults;
  const impls = Object.keys(results).sort((a,b) => (results[a].elapsed||9999) - (results[b].elapsed||9999));
  const fastest = impls[0];

  // Race results header
  const header = h('div',{style:{padding:'12px 24px',borderBottom:'1px solid var(--border)',background:'var(--bg2)'}});
  header.appendChild(h('div',{style:{fontSize:'14px',fontWeight:700,marginBottom:'8px'}},'Race Results'));

  // Bar chart
  const maxMs = Math.max(...Object.values(results).map(r => r.elapsed || 0));
  impls.forEach(id => {
    const r = results[id];
    const impl = IMPLS[id] || { name: id, color: '#888', icon: '' };
    const pct = maxMs > 0 ? Math.max(5, (r.elapsed / maxMs) * 100) : 100;
    const lane = h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'6px'}});
    lane.appendChild(h('span',{style:{width:'80px',fontSize:'12px',fontWeight:600,color:impl.color}},impl.icon + ' ' + impl.name));
    const track = h('div',{style:{flex:1,height:'24px',background:'var(--bg)',borderRadius:'6px',overflow:'hidden'}});
    const fill = h('div',{style:{height:'100%',width:pct+'%',background:id===fastest?'var(--green)':impl.color,borderRadius:'6px',animation:'barGrow 0.5s ease-out',display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:'8px'}});
    fill.appendChild(h('span',{style:{fontSize:'10px',fontWeight:700,color:'#fff',fontFamily:'monospace'}},fmt(r.elapsed)));
    track.appendChild(fill);
    lane.appendChild(track);
    lane.appendChild(h('span',{style:{width:'60px',fontSize:'10px',color:'var(--fg3)',textAlign:'right'}},r.bytes + 'b'));
    if (id === fastest) lane.appendChild(h('span',{style:{fontSize:'10px',fontWeight:700,color:'var(--green)'}},'WIN'));
    header.appendChild(lane);
  });
  container.appendChild(header);

  // Detailed results per impl
  const grid = h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',padding:'16px 24px'}});
  impls.forEach(id => {
    const r = results[id];
    const impl = IMPLS[id] || { name: id, color: '#888', icon: '' };
    const card = h('div',{style:{borderRadius:'12px',border:'1px solid '+(id===fastest?'var(--green)':'var(--border)'),overflow:'hidden',background:'var(--bg2)'}});
    const hd = h('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'8px 12px',borderBottom:'1px solid var(--bg3)',borderTop:'2px solid '+impl.color}});
    hd.appendChild(h('span',{style:{fontSize:'12px',fontWeight:600,color:impl.color}},impl.icon + ' ' + (impl.name || id)));
    hd.appendChild(h('span',{style:{fontSize:'11px',fontFamily:'monospace',color:id===fastest?'var(--green)':'var(--fg3)'}},fmt(r.elapsed)));
    hd.appendChild(h('span',{style:{marginLeft:'auto',fontSize:'10px',color:'var(--fg3)'}},r.bytes+'b'));
    if (id === fastest) hd.appendChild(h('span',{style:{fontSize:'10px',fontWeight:700,color:'var(--green)',marginLeft:'6px'}},'FASTEST'));
    card.appendChild(hd);
    const body = h('pre',{style:{padding:'8px 12px',maxHeight:'200px',overflowY:'auto',fontSize:'10px',fontFamily:'monospace',lineHeight:'1.5',color:'var(--fg2)',whiteSpace:'pre-wrap',margin:0}});
    body.textContent = r.text || 'Error';
    card.appendChild(body);
    grid.appendChild(card);
  });
  container.appendChild(grid);
}

async function runAPISearch() {
  if (!apiState.specPath || apiState.searching) return;
  apiState.searching = true;
  apiState.raceResults = null;
  const area = document.getElementById('api-results');
  if (area) area.innerHTML = '<div style="padding:40px;text-align:center"><div class="f1-loader fast" style="width:200px;margin:0 auto 16px"></div><div style="color:var(--green);font-size:13px;font-weight:600"><span class="f1-dots"><span></span><span></span><span></span><span></span></span> Searching spec</div></div>';

  try {
    const resp = await fetch('/api/openapi/search', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ path: apiState.specPath, query: apiState.query, mode: apiState.mode, impl: state.impl })
    });
    apiState.results = await resp.json();
  } catch (e) {
    apiState.results = { text: 'Error: ' + e.message, elapsed: 0, bytes: 0 };
  }
  apiState.searching = false;
  const _el3 = document.getElementById('api-results');
  if (_el3) renderAPIResults(_el3);
}

async function runAPIRace() {
  if (!apiState.specPath || apiState.racing) return;
  apiState.racing = true;
  apiState.results = null;
  const area = document.getElementById('api-results');
  if (area) area.innerHTML = '<div style="padding:40px;text-align:center"><div class="f1-loader" style="width:240px;margin:0 auto 16px"></div><div style="color:var(--green);font-size:13px;font-weight:600"><span class="f1-dots"><span></span><span></span><span></span><span></span></span> Racing all servers...</div></div>';

  try {
    const resp = await fetch('/api/openapi/race', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ path: apiState.specPath, query: apiState.query, mode: apiState.mode })
    });
    apiState.raceResults = await resp.json();
  } catch (e) {
    apiState.raceResults = { node: { text: 'Error: ' + e.message, elapsed: 0, bytes: 0 } };
  }
  apiState.racing = false;
  const _el4 = document.getElementById('api-results');
  if (_el4) renderAPIRaceResults(_el4);
}

function buildWarpAnimation(statusText = 'Scanning', subText = '') {
  const container = h('div',{className:'warp-container'});

}

// CSS warp animation (Safari compatible)
function buildWarpCSS(container, statusText, subText) {
  const stars = h('div',{className:'warp-stars'});
  for (let layer = 0; layer < 3; layer++) {
    const sl = h('div',{className:'warp-star-layer'});
    for (let i = 0; i < 40; i++) {
      sl.appendChild(h('div',{style:{left:(Math.random()*100)+'%',top:(Math.random()*100)+'%',width:(1+Math.random()*2)+'px',height:(1+Math.random()*2)+'px',opacity:0.3+Math.random()*0.7}}));
    }
    stars.appendChild(sl);
  }
  container.appendChild(stars);
  const lines = h('div',{className:'warp-lines'});
  for (let i = 0; i < 24; i++) {
    lines.appendChild(h('div',{className:'warp-line',style:{transform:`rotate(${(i/24)*360}deg)`,animationDelay:`${-Math.random()*0.8}s`,animationDuration:`${0.5+Math.random()*0.6}s`}}));
  }
  container.appendChild(lines);
  const tunnel = h('div',{className:'warp-tunnel'});
  for (let i = 0; i < 7; i++) tunnel.appendChild(h('div',{className:'warp-ring'}));
  container.appendChild(tunnel);
  const core = h('div',{className:'warp-core'});
  core.appendChild(h('div',{className:'warp-glow'}));
  core.appendChild(h('div',{className:'warp-text',id:'warp-status'},statusText));
  core.appendChild(h('div',{className:'warp-sub',id:'warp-sub'},subText));
  container.appendChild(core);
  return container;
}

function gradeFor(score) {
  if (score >= 90) return 'A+';
  if (score >= 80) return 'A';
  if (score >= 70) return 'B';
  if (score >= 60) return 'C';
  return 'D';
}

function renderCockpitStream() {
  const el = document.getElementById('cockpit-stream');
  if (!el) return;
  el.innerHTML = '';
  if (cockpitState.steps.length === 0) {
    el.appendChild(h('div',{style:{textAlign:'center',padding:'30px 10px',color:'var(--fg3)',fontSize:'12px'}},'Waiting for launch…'));
    return;
  }
  cockpitState.steps.forEach(step => {
    const color = step.status === 'done' ? 'var(--green)' : step.status === 'error' ? '#ef4444' : '#f59e0b';
    const icon = step.status === 'done' ? '✓' : step.status === 'error' ? '✗' : '⟳';
    const card = h('div',{style:{padding:'8px 10px',borderRadius:'8px',marginBottom:'6px',background:'var(--bg)',border:'1px solid var(--bg3)',display:'flex',alignItems:'center',gap:'8px',fontSize:'11px'}});
    card.appendChild(h('span',{style:{color,fontWeight:700,width:'12px'}},icon));
    card.appendChild(h('span',{style:{flex:1,color:'var(--fg2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},step.label));
    if (step.elapsed) card.appendChild(h('span',{style:{fontFamily:'monospace',color:'var(--fg3)',fontSize:'10px'}},step.elapsed+'ms'));
    if (step.findings > 0) card.appendChild(h('span',{style:{padding:'1px 6px',borderRadius:'5px',background:'rgba(239,68,68,0.15)',color:'#ef4444',fontSize:'10px',fontWeight:700}},step.findings));
    el.appendChild(card);
  });
}

function renderCockpitSummary() {

async function openCockpitFile(filePath, lineNum) {
  const body = document.getElementById('cockpit-code-body');
  if (!body) return;
  body.textContent = 'Loading ' + filePath + '…';
  try {
    const resp = await fetch('/api/file/read', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ path: filePath, start_line: Math.max(1, lineNum - 30), end_line: lineNum + 30 })
    });
    const data = await resp.json();
    body.innerHTML = '';
    const header = h('div',{style:{fontSize:'11px',color:'var(--fg2)',marginBottom:'8px',fontWeight:700}},filePath + '  ·  L' + lineNum);
    body.appendChild(header);
    const pre = h('pre',{style:{margin:0,whiteSpace:'pre',fontSize:'11px',lineHeight:'1.6',color:'var(--fg2)'}});

async function runCockpitAnalysis() {
  if (cockpitState.running || !cockpitState.repo.trim()) return;
  cockpitState.running = true;
  cockpitState.steps = [];
  cockpitState.findings = [];
  cockpitState.scores = null;
  cockpitState.complete = null;
  currentTab = null; render();

  let repo = cockpitState.repo.trim();
  const ghMatch = repo.match(/github\.com\/([^\/\s]+\/[^\/\s]+)/);
  if (ghMatch) repo = ghMatch[1];

  try {
    const response = await fetch('/api/cockpit/analyze', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(repo.startsWith('/') ? { path: repo } : { repo }),
    });
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let leftover = '';
    const dispatch = (evt, d) => {
      if (evt === 'step') {
        const existing = cockpitState.steps.find(s => s.name === d.name);
        if (existing) Object.assign(existing, d);
        else cockpitState.steps.push(d);
        renderCockpitStream();
        renderCockpitSummary();
      } else if (evt === 'finding') {
        cockpitState.findings.push(d);
        renderCockpitFindings();
      } else if (evt === 'scores') {
        cockpitState.scores = d;
        renderCockpitScores();
      } else if (evt === 'complete') {
        cockpitState.complete = d;
        cockpitState.scores = d.scores || cockpitState.scores;
        renderCockpitScores();
        renderCockpitSummary();
      }
    };
    while (true) {
      const { done, value } = await reader.read();
      if (value) leftover += decoder.decode(value, { stream: true });
      if (done) leftover += decoder.decode();
      // Parse complete \n\n-delimited SSE event blocks
      let idx;
      while ((idx = leftover.indexOf('\n\n')) !== -1) {
        const block = leftover.slice(0, idx);
        leftover = leftover.slice(idx + 2);
        let evt = null, data = null;
        for (const line of block.split('\n')) {
          if (line.startsWith('event: ')) evt = line.slice(7).trim();
          else if (line.startsWith('data: ')) data = line.slice(6);
        }
        if (evt && data) {
          try { dispatch(evt, JSON.parse(data)); } catch {}
        }
      }
      if (done) break;
      // Yield to the browser so DOM updates paint between bursts
      await new Promise(r => setTimeout(r, 0));
    }
  } catch (e) {
    cockpitState.steps.push({ name:'error', status:'error', label:'Failed: '+e.message });
    renderCockpitStream();
  }

  cockpitState.running = false;
  // Re-render the launch button label
  const oldGrid = document.getElementById('cockpit-grid');
  if (oldGrid) {
    currentTab = null; render();
  }
}

async function runWhiteHatAudit() {
  if (whState.scanning || !whState.repo.trim()) return;
  whState.scanning = true;
  whState.steps = [];
  whState.complete = null;
  currentTab = null; render();

  // Show warp animation
  const _el6 = document.getElementById('wh-results');
  if (_el6) {
    _el6.innerHTML = '';
    _el6.appendChild(buildWarpAnimation('Initializing', 'Preparing security scan pipeline...'));
  }

  // Parse repo
  let repo = whState.repo.trim();
  const ghMatch = repo.match(/github\.com\/([^\/\s]+\/[^\/\s]+)/);
  if (ghMatch) repo = ghMatch[1];

  try {
    const response = await fetch('/api/security/audit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ repo }),
    });
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (!done) buffer += decoder.decode(value, { stream: true });
      else buffer += decoder.decode();

      const lines = buffer.split('\n');
      buffer = done ? '' : lines.pop();

      let evt = null;
      for (const line of lines) {
        if (line.startsWith('event: ')) evt = line.slice(7).trim();
        else if (line.startsWith('data: ') && evt) {
          try {
            const d = JSON.parse(line.slice(6));
            if (evt === 'step') {
              // Update or add step
              const existing = whState.steps.find(s => s.name === d.name);
              if (existing) {
                Object.assign(existing, d);
              } else {
                whState.steps.push(d);
              }
              // Update warp animation text while scanning
              if (d.status === 'running') {
                updateWarpStatus(d.label || 'Scanning', `Step ${whState.steps.length}/7`);
              }
              // Once first result comes in, stop warp and switch to results
              const doneSteps = whState.steps.filter(s => s.status === 'done' || s.status === 'error');
              if (doneSteps.length >= 1) {
                stopWarp();
                const whEl1 = document.getElementById('wh-results');
                if (whEl1) renderWhiteHatResults(whEl1);
              }
            }
            if (evt === 'complete') {
              whState.complete = d;
              const whEl2 = document.getElementById('wh-results');
              if (whEl2) renderWhiteHatResults(whEl2);
            }
          } catch {}
          evt = null;
        }
      }
      if (done) break;
    }
  } catch (e) {
    whState.steps.push({ name: 'error', status: 'error', label: 'Audit failed: ' + e.message });
  }

  whState.scanning = false;
  const _el7 = document.getElementById('wh-results');
  if (_el7) renderWhiteHatResults(_el7);
}
