<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milli-Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { --bg:#09090b; --bg2:#18181b; --bg3:#27272a; --border:#3f3f46; --fg:#fafafa; --fg2:#a1a1aa; --fg3:#71717a; --purple:#8b5cf6; --green:#22c55e; --red:#ef4444; --yellow:#f59e0b; --blue:#3b82f6;
  --sidebar-w:220px; --radius:12px; --radius-sm:8px; --shadow-sm:0 1px 2px rgba(0,0,0,.3); --shadow-md:0 4px 12px rgba(0,0,0,.4); --shadow-lg:0 8px 24px rgba(0,0,0,.5); }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; background:var(--bg); color:var(--fg); font-family:'Inter',system-ui,sans-serif; font-size:14px; -webkit-font-smoothing:antialiased; }
code,.mono { font-family:'JetBrains Mono',monospace; }
::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-thumb { background:#333; border-radius:99px; }
::selection { background:var(--purple); color:#fff; }
@keyframes spin { to{transform:rotate(360deg);} }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px);} to{opacity:1;transform:translateY(0);} }
@keyframes slideIn { from{opacity:0;transform:translateX(-8px);} to{opacity:1;transform:translateX(0);} }
@keyframes barGrow { from{width:0;} }
@keyframes pulse { 0%,100%{opacity:.4;} 50%{opacity:1;} }
@keyframes shimmer { 0%{background-position:-200% 0;} 100%{background-position:200% 0;} }
@keyframes f1scan { 0%{left:-30%;} 100%{left:130%;} }
@keyframes f1pulse { 0%,100%{opacity:0.2;transform:scale(0.8);} 50%{opacity:1;transform:scale(1.3);} }

/* Skeleton loader */
.skeleton { background:linear-gradient(90deg,var(--bg3) 25%,#333 50%,var(--bg3) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:var(--radius-sm); }

/* F1 loader */
.f1-loader { position:relative; height:3px; background:var(--bg3); overflow:hidden; border-radius:2px; }
.f1-loader::after { content:''; position:absolute; top:0; left:-30%; width:30%; height:100%; background:linear-gradient(90deg, transparent, var(--green), var(--green), transparent); animation:f1scan 0.7s ease-in-out infinite; border-radius:2px; }
.f1-loader.fast::after { animation-duration:0.4s; background:linear-gradient(90deg, transparent, #00ff88, #00ff88, transparent); }
.f1-dots { display:inline-flex; gap:3px; align-items:center; }
.f1-dots span { width:4px; height:4px; border-radius:50%; background:var(--green); animation:f1pulse 0.6s ease-in-out infinite; }
.f1-dots span:nth-child(2) { animation-delay:0.1s; }
.f1-dots span:nth-child(3) { animation-delay:0.2s; }
.f1-dots span:nth-child(4) { animation-delay:0.3s; }

/* Toast */
.toast { position:fixed; bottom:24px; right:24px; padding:10px 16px; border-radius:var(--radius-sm); background:var(--bg3); border:1px solid var(--border); color:var(--fg2); font-size:13px; z-index:999; animation:fadeIn .3s ease-out; box-shadow:var(--shadow-md); }
.toast.success { border-color:var(--green); color:var(--green); }
.toast.error { border-color:var(--red); color:var(--red); }

/* Layout — sidebar + content */
#app { display:flex; height:100vh; }
.sidebar { width:var(--sidebar-w); flex-shrink:0; display:flex; flex-direction:column; border-right:1px solid var(--border); background:var(--bg); }
.sidebar-logo { padding:20px 16px 16px; display:flex; align-items:center; gap:10px; }
.sidebar-logo h1 { font-size:16px; font-weight:800; letter-spacing:-0.5px; }
.sidebar-logo span { font-size:10px; color:var(--green); font-family:monospace; font-weight:600; padding:2px 6px; border-radius:4px; background:rgba(34,197,94,.1); }
.sidebar-nav { flex:1; padding:4px 8px; }
.sidebar-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:var(--radius-sm); font-size:13px; font-weight:500; color:var(--fg3); cursor:pointer; transition:all .15s; border:none; background:none; width:100%; text-align:left; }
.sidebar-item:hover { background:var(--bg2); color:var(--fg2); }
.sidebar-item.active { background:var(--bg3); color:var(--fg); box-shadow:var(--shadow-sm); }
.sidebar-item .icon { width:18px; text-align:center; font-size:14px; }
.sidebar-item .badge { margin-left:auto; font-size:9px; padding:1px 6px; border-radius:4px; font-weight:700; font-family:monospace; }
.sidebar-footer { padding:12px 16px; border-top:1px solid var(--border); }
.sidebar-footer .sel { width:100%; margin-bottom:6px; height:30px; font-size:12px; border-radius:var(--radius-sm); }
.sidebar-stats { display:flex; flex-wrap:wrap; gap:6px; }
.sidebar-stat { font-size:10px; font-family:monospace; padding:2px 6px; border-radius:4px; }

.content { flex:1; overflow:hidden; display:flex; flex-direction:column; }

/* Shared components */
.main { flex:1; overflow:hidden; display:flex; flex-direction:column; }
.messages { flex:1; overflow-y:auto; padding:24px 16px; }
.messages-inner { max-width:768px; margin:0 auto; }
.msg-user { display:flex; justify-content:flex-end; margin-bottom:16px; animation:fadeIn .3s ease-out; }
.msg-user > div { background:linear-gradient(135deg, var(--purple), #7c3aed); color:#fff; border-radius:var(--radius) var(--radius) 4px var(--radius); padding:10px 14px; font-size:14px; max-width:75%; box-shadow:var(--shadow-sm); }
.msg-asst { margin-bottom:20px; animation:fadeIn .3s ease-out; }
.bubble { background:var(--bg2); border:1px solid var(--border); border-radius:4px var(--radius) var(--radius) var(--radius); padding:12px 16px; font-size:14px; max-width:80%; white-space:pre-wrap; line-height:1.7; }
.stats { display:flex; flex-wrap:wrap; gap:12px; margin-top:8px; font-size:11px; color:var(--fg3); }
.loading { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--fg3); margin-top:4px; }
.spinner { width:14px; height:14px; border:2px solid var(--bg3); border-top:2px solid var(--purple); border-radius:50%; display:inline-block; animation:spin .7s linear infinite; }

/* Tool call cards */
.tc { border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; background:var(--bg2); margin-bottom:12px; max-width:85%; animation:slideIn .3s ease-out; box-shadow:var(--shadow-sm); }
.tc-head { display:flex; align-items:center; gap:8px; padding:8px 12px; font-size:13px; color:var(--fg2); cursor:pointer; transition:background .15s; }
.tc-head:hover { background:rgba(255,255,255,.02); }
.tc-badge { font-size:10px; padding:2px 8px; border-radius:6px; font-weight:600; font-family:monospace; }
.tc-args { border-top:1px solid var(--bg3); padding:6px 12px; font-size:11px; font-family:monospace; color:var(--fg3); background:rgba(0,0,0,.2); }
.tc-lines { border-top:1px solid var(--bg3); max-height:200px; overflow-y:auto; font-size:11px; font-family:monospace; animation:fadeIn 0.2s ease-out; }
.tc-line { display:flex; padding:2px 12px; transition:background .1s; }
.tc-line:hover { background:rgba(139,92,246,.06); }
.tc-f { color:var(--purple); width:110px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tc-n { color:var(--fg3); width:40px; text-align:right; margin-right:8px; flex-shrink:0; }
.tc-c { color:#d4d4d8; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tc-stats { border-top:1px solid var(--bg3); display:flex; gap:16px; padding:6px 12px; font-size:10px; color:var(--fg3); animation:fadeIn 0.3s ease-out; }

/* Input area */
.input-area { padding:12px 16px 16px; border-top:1px solid var(--border); flex-shrink:0; background:var(--bg); }
.input-wrap { max-width:768px; margin:0 auto; position:relative; }
.input-wrap textarea { width:100%; resize:none; border-radius:var(--radius); border:1px solid var(--border); background:var(--bg2); padding:12px 56px 12px 16px; font-size:14px; color:var(--fg); outline:none; font-family:inherit; line-height:1.5; transition:border-color .2s, box-shadow .2s; }
.input-wrap textarea:focus { border-color:var(--purple); box-shadow:0 0 0 3px rgba(139,92,246,.15); }
.send-btn { position:absolute; right:8px; top:8px; width:36px; height:36px; border-radius:10px; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; transition:all .15s; }
.send-btn:hover { transform:scale(1.05); }

/* Empty states */
.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; animation:fadeIn .5s ease-out; }
.empty-icon { width:64px; height:64px; border-radius:20px; background:linear-gradient(135deg, var(--bg3), var(--bg2)); display:flex; align-items:center; justify-content:center; font-size:28px; margin-bottom:20px; box-shadow:var(--shadow-md); }
.sugg-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; width:100%; max-width:560px; margin-top:24px; }
.sugg { text-align:left; font-size:13px; padding:12px 16px; border-radius:var(--radius); border:1px solid var(--border); background:var(--bg2); color:var(--fg2); cursor:pointer; line-height:1.4; transition:all .2s; }
.sugg:hover { border-color:var(--purple); color:var(--fg); transform:translateY(-1px); box-shadow:var(--shadow-sm); }

/* Search, Compare shared */
.sinput { flex:1; padding:10px 14px; font-size:13px; font-family:monospace; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--fg); outline:none; transition:border-color .2s, box-shadow .2s; }
.sinput:focus { border-color:var(--purple); box-shadow:0 0 0 3px rgba(139,92,246,.12); }
.sbtn { padding:10px 20px; font-size:13px; font-weight:600; background:var(--fg); color:var(--bg); border:none; border-radius:var(--radius-sm); cursor:pointer; transition:all .15s; }
.sbtn:hover { transform:translateY(-1px); box-shadow:var(--shadow-sm); }
.sbtn:disabled { opacity:.3; }
.pre { font-size:11px; font-family:monospace; padding:4px 10px; border-radius:6px; border:1px solid var(--border); background:none; color:var(--fg2); cursor:pointer; transition:all .15s; }
.pre:hover { border-color:var(--purple); color:var(--fg); background:rgba(139,92,246,.06); }

/* Race/compare */
.track { flex:1; height:24px; background:var(--bg); border-radius:6px; overflow:hidden; }
.fill { height:100%; border-radius:6px; animation:barGrow .5s ease-out; }
.rcard { border-radius:var(--radius); border:1px solid var(--border); overflow:hidden; background:var(--bg2); transition:all 0.3s; }
.rcard:hover { box-shadow:var(--shadow-md); }
.rhead { display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--bg3); }

/* CMD+K modal */
.cmdk-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; backdrop-filter:blur(4px); animation:fadeIn .15s; }
.cmdk { position:fixed; top:20%; left:50%; transform:translateX(-50%); width:560px; max-height:400px; background:var(--bg2); border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow-lg); z-index:101; overflow:hidden; animation:fadeIn .2s ease-out; }
.cmdk input { width:100%; padding:16px 20px; font-size:16px; background:transparent; border:none; border-bottom:1px solid var(--border); color:var(--fg); outline:none; font-family:inherit; }
.cmdk-results { max-height:300px; overflow-y:auto; padding:8px; }
.cmdk-item { padding:10px 12px; border-radius:var(--radius-sm); cursor:pointer; display:flex; align-items:center; gap:10px; font-size:13px; color:var(--fg2); transition:background .1s; }
.cmdk-item:hover,.cmdk-item.active { background:var(--bg3); color:var(--fg); }
.cmdk-item .shortcut { margin-left:auto; font-size:10px; font-family:monospace; color:var(--fg3); padding:2px 6px; border-radius:4px; background:var(--bg); }

/* ═══ Warp Speed / Interstellar Loading Animation ═══ */
.warp-container {
  position:relative; width:100%; height:300px; overflow:hidden;
  background:radial-gradient(ellipse at center, #0a0015 0%, #000 70%);
  border-radius:var(--radius); margin-bottom:16px;
  display:flex; align-items:center; justify-content:center;
}

/* Star field — 3 layers at different speeds */
.warp-stars {
  position:absolute; inset:0; overflow:hidden;
}
.warp-stars div {
  position:absolute; width:2px; height:2px; background:#fff; border-radius:50%;
}
.warp-star-layer {
  position:absolute; inset:0;
  animation: warpZoom 1.5s linear infinite;
}
.warp-star-layer:nth-child(2) { animation-delay:-0.5s; animation-duration:1.2s; }
.warp-star-layer:nth-child(3) { animation-delay:-1s; animation-duration:0.9s; }

@keyframes warpZoom {
  0% { transform:scale(0.1) rotate(0deg); opacity:0; }
  20% { opacity:1; }
  100% { transform:scale(3) rotate(10deg); opacity:0; }
}

/* Tunnel rings — concentric circles rushing toward viewer */
.warp-tunnel {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
}
.warp-ring {
  position:absolute; border:1px solid rgba(139,92,246,.15); border-radius:50%;
  animation: warpRing 2s linear infinite;
}
.warp-ring:nth-child(1) { animation-delay:0s; }
.warp-ring:nth-child(2) { animation-delay:-0.3s; }
.warp-ring:nth-child(3) { animation-delay:-0.6s; }
.warp-ring:nth-child(4) { animation-delay:-0.9s; }
.warp-ring:nth-child(5) { animation-delay:-1.2s; }
.warp-ring:nth-child(6) { animation-delay:-1.5s; }
.warp-ring:nth-child(7) { animation-delay:-1.8s; }

@keyframes warpRing {
  0% { width:4px; height:4px; opacity:0; border-color:rgba(139,92,246,.6); border-width:2px; }
  30% { opacity:1; }
  100% { width:800px; height:800px; opacity:0; border-color:rgba(139,92,246,.02); border-width:1px; }
}

/* Tesseract grid lines */
.warp-grid {
  position:absolute; inset:0; overflow:hidden; opacity:0.15;
}
.warp-grid-line {
  position:absolute; background:linear-gradient(to bottom, transparent, var(--purple), transparent);
  animation: warpGridLine 3s linear infinite;
}
.warp-grid-line.h { width:100%; height:1px; left:0; }
.warp-grid-line.v { width:1px; height:100%; top:0; }

@keyframes warpGridLine {
  0% { opacity:0; transform:scaleX(0); }
  50% { opacity:1; transform:scaleX(1); }
  100% { opacity:0; transform:scaleX(0); }
}

/* Central light burst */
.warp-core {
  position:relative; z-index:2; text-align:center;
}
.warp-glow {
  width:80px; height:80px; border-radius:50%; margin:0 auto 16px;
  background:radial-gradient(circle, rgba(139,92,246,.8) 0%, rgba(139,92,246,.2) 40%, transparent 70%);
  animation: warpPulse 1.5s ease-in-out infinite;
  box-shadow:0 0 60px rgba(139,92,246,.4), 0 0 120px rgba(139,92,246,.2);
}
@keyframes warpPulse {
  0%,100% { transform:scale(0.8); opacity:0.6; }
  50% { transform:scale(1.2); opacity:1; }
}

.warp-text {
  font-size:14px; font-weight:600; color:var(--fg); letter-spacing:2px; text-transform:uppercase;
  text-shadow:0 0 20px rgba(139,92,246,.5);
  animation:fadeIn .5s ease-out;
}
.warp-sub {
  font-size:11px; color:var(--fg3); margin-top:6px; font-family:monospace;
  animation:fadeIn .5s ease-out .3s both;
}

/* Speed lines radiating from center */
.warp-lines {
  position:absolute; inset:0; overflow:hidden;
}
.warp-line {
  position:absolute; top:50%; left:50%;
  width:2px; height:0;
  background:linear-gradient(to bottom, transparent, rgba(255,255,255,.6), transparent);
  transform-origin:top center;
  animation: warpLine 0.8s linear infinite;
}
@keyframes warpLine {
  0% { height:0; opacity:0; }
  30% { opacity:1; }
  100% { height:300px; opacity:0; }
}

/* Responsive: collapse sidebar on small screens */
@media (max-width: 768px) {
  .sidebar { width:56px; }
  .sidebar-logo h1,.sidebar-logo span,.sidebar-item span:not(.icon),.sidebar-item .badge,.sidebar-footer .sel:not(:first-child),.sidebar-stats { display:none; }
  .sidebar-item { justify-content:center; padding:12px; }
}
</style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#a1a1aa;font-family:Inter,system-ui,sans-serif"><div style="text-align:center"><div style="font-size:24px;font-weight:800;margin-bottom:8px;color:#fafafa">Milli-Agent</div><div style="font-size:13px">Loading 27 tools...</div></div></div></div>
<script type="module">
const IMPLS = {cpp:{name:'C++',color:'#00a0e4',icon:'⚡'},rust:{name:'Rust',color:'#f74c00',icon:'🦀'},zig:{name:'Zig',color:'#f7a41d',icon:'⚙'},swift:{name:'Swift',color:'#f05138',icon:'🐦'},python:{name:'Python',color:'#ffd43b',icon:'🐍'}};
const fmt = ms => ms<1000?Math.round(ms)+'ms':(ms/1000).toFixed(1)+'s';
const h = (tag, props, ...kids) => { const el=document.createElement(tag); if(props) Object.entries(props).forEach(([k,v])=>{ if(k==='style'&&typeof v==='object') Object.assign(el.style,v); else if(k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v); else if(k==='className') el.className=v; else if(k==='innerHTML') el.innerHTML=v; else el.setAttribute(k,v); }); kids.flat(9).forEach(c=>{ if(c==null)return; el.appendChild(typeof c==='string'?document.createTextNode(c):c); }); return el; };

let state = { tab:'search', model:'google/gemma-4-26b-a4b-it', impl:'cpp', models:[], activeModels:['google/gemma-4-26b-a4b-it'], ready:0, msgs:[], input:'', sending:false, racePattern:'', racePath:'https://github.com/walter-grace/milli-agent', raceResults:{}, raceWinner:null, racing:false, sessionCost:0, accountCost:0, cacheHits:0, cacheSaved:0 };
let currentTab = null;
let chatInput = null; // persistent textarea ref
let raceInput = null; // persistent race input ref

function refreshNav() {
  const app = document.getElementById('app');
  const oldNav = app.querySelector('.sidebar');
  if (oldNav) { const newNav = buildNav(); app.replaceChild(newNav, oldNav); }
}

function render() {
  try {
  const app = document.getElementById('app');

  // Only full rebuild on tab change or first render
  if (!app.firstChild || currentTab !== state.tab) {
    app.innerHTML = '';
    app.appendChild(buildNav());
    const content = h('div',{className:'content'});

    // Model tab bar — horizontal chips like OpenRouter
    if (state.activeModels.length > 0 && state.models.length > 0) {
      const modelBar = h('div',{style:{display:'flex',alignItems:'center',gap:'4px',padding:'6px 12px',borderBottom:'1px solid var(--border)',overflowX:'auto',flexShrink:0}});
      state.activeModels.forEach(mid => {
        const m = state.models.find(x => x.id === mid);
        if (!m) return;
        const isCurrent = state.model === mid;
        const chip = h('div',{style:{display:'flex',alignItems:'center',gap:'6px',padding:'4px 10px',borderRadius:'8px',fontSize:'12px',fontWeight:500,cursor:'pointer',flexShrink:0,transition:'all .15s',
          background:isCurrent?'var(--bg3)':'transparent',
          color:isCurrent?'var(--fg)':'var(--fg3)',
          border:'1px solid '+(isCurrent?'var(--border)':'transparent')},
          onClick:()=>{state.model=mid;render();}});
        chip.appendChild(h('span',null,m.name));
        // × close button
        if (state.activeModels.length > 1) {
          const close = h('span',{style:{fontSize:'10px',color:'var(--fg3)',cursor:'pointer',marginLeft:'2px',padding:'0 2px',borderRadius:'3px',transition:'color .1s'},
            onClick:(e)=>{e.stopPropagation();state.activeModels=state.activeModels.filter(id=>id!==mid);if(state.model===mid)state.model=state.activeModels[0];render();}});
          close.textContent = '×';
          close.addEventListener('mouseenter',()=>close.style.color='var(--red)');
          close.addEventListener('mouseleave',()=>close.style.color='var(--fg3)');
          chip.appendChild(close);
        }
        modelBar.appendChild(chip);
      });
      // + button to add model
      const addBtn = h('button',{style:{width:'26px',height:'26px',borderRadius:'6px',border:'1px dashed var(--border)',background:'transparent',color:'var(--fg3)',cursor:'pointer',fontSize:'14px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .15s'},
        onClick:()=>{toggleCmdK();}});
      addBtn.textContent = '+';
      addBtn.addEventListener('mouseenter',()=>{addBtn.style.borderColor='var(--purple)';addBtn.style.color='var(--purple)';});
      addBtn.addEventListener('mouseleave',()=>{addBtn.style.borderColor='var(--border)';addBtn.style.color='var(--fg3)';});
      modelBar.appendChild(addBtn);
      content.appendChild(modelBar);
    }
    if (state.tab==='search') content.appendChild(renderSearch());
    else if (state.tab==='chat') content.appendChild(renderChat());
    else if (state.tab==='api') content.appendChild(renderAPI());
    else if (state.tab==='whitehat') content.appendChild(renderWhiteHat());
    else if (state.tab==='heal') content.appendChild(renderHeal());
    else content.appendChild(renderCompare());
    app.appendChild(content);
    currentTab = state.tab;
  } else {
    // Update sidebar active state
    const oldSidebar = app.querySelector('.sidebar');
    if (oldSidebar) { const newSidebar = buildNav(); app.replaceChild(newSidebar, oldSidebar); }
    if (state.tab==='chat') updateChatMessages();
    else if (state.tab==='compare') updateCompareResults();
  }
  } catch(e) { console.error('Render error:', e); document.getElementById('app').innerHTML = '<div style="padding:40px;color:#fff">Render error: '+e.message+'</div>'; }
}

// CMD+K global search
let cmdkOpen = false;
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    toggleCmdK();
  }
  if (e.key === 'Escape' && cmdkOpen) closeCmdK();
  // / to focus search
  if (e.key === '/' && !e.target.closest('input,textarea,select')) {
    e.preventDefault();
    if (state.tab !== 'search') { state.tab = 'search'; render(); }
    setTimeout(() => { if (searchInput) searchInput.focus(); }, 100);
  }
});

function toggleCmdK() {
  if (cmdkOpen) { closeCmdK(); return; }
  cmdkOpen = true;
  const overlay = h('div',{className:'cmdk-overlay',onClick:closeCmdK});
  const modal = h('div',{className:'cmdk'});
  const input = document.createElement('input');
  input.placeholder = 'Search tools, actions, repos...';
  input.addEventListener('input', e => updateCmdKResults(e.target.value, modal));
  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeCmdK();
    if (e.key === 'Enter') { const active = modal.querySelector('.cmdk-item.active'); if (active) active.click(); }
  });
  modal.appendChild(input);
  const results = h('div',{className:'cmdk-results'});
  // Default items
  NAV_ITEMS.forEach(item => {
    const row = h('div',{className:'cmdk-item',onClick:()=>{ closeCmdK(); state.tab=item.id; render(); }},
      h('span',null,item.icon), h('span',null,item.label + ' — ' + item.desc));
    results.appendChild(row);
  });
  modal.appendChild(results);
  document.body.appendChild(overlay);
  document.body.appendChild(modal);
  setTimeout(() => input.focus(), 50);
}

function closeCmdK() {
  cmdkOpen = false;
  document.querySelectorAll('.cmdk-overlay,.cmdk').forEach(el => el.remove());
}

function updateCmdKResults(query, modal) {
  const results = modal.querySelector('.cmdk-results');
  if (!results) return;
  results.innerHTML = '';
  const q = query.toLowerCase();
  const allItems = [
    ...NAV_ITEMS.map(i => ({ ...i, action: () => { state.tab = i.id; render(); } })),
    { icon:'🔧', label:'grep_search', desc:'Regex search files', action:()=>{ state.tab='search'; render(); } },
    { icon:'📦', label:'clone_repo', desc:'Clone a GitHub repo', action:()=>{ state.tab='chat'; render(); } },
    { icon:'🛡', label:'Run Security Audit', desc:'Full OWASP + CVE scan', action:()=>{ state.tab='whitehat'; render(); } },
    { icon:'📊', label:'OpenAPI Search', desc:'Upload and search specs', action:()=>{ state.tab='api'; render(); } },
  ];
  const filtered = q ? allItems.filter(i => (i.label+i.desc).toLowerCase().includes(q)) : allItems;
  filtered.slice(0, 8).forEach((item, idx) => {
    const row = h('div',{className:'cmdk-item'+(idx===0?' active':''),onClick:()=>{ closeCmdK(); item.action(); }},
      h('span',null,item.icon), h('span',null,item.label + ' — ' + item.desc));
    results.appendChild(row);
  });
}

function renderSelect(cls,val,opts,onChange) {
  const sel = h('select',{className:cls});
  opts.forEach(o => { const opt=h('option',{value:o.value},o.label); if(o.value===val)opt.selected=true; sel.appendChild(opt); });
  sel.addEventListener('change',e=>{onChange(e.target.value);});
  return sel;
}

function renderToolCard(tc) {
  const impl = IMPLS[tc.impl]||IMPLS.cpp;
  const loading = !tc.result;
  const card = h('div',{className:'tc'});

  const head = h('div',{className:'tc-head'},
    loading ? h('span',{className:'spinner'}) : h('span',null,'▶'),
    h('span',null,(loading?'Calling ':'Result from ')),
    h('code',{style:{color:'var(--purple)',fontSize:'11px'}},'grep_search'),
    h('span',{className:'tc-badge',style:{background:impl.color+'15',color:impl.color,border:'1px solid '+impl.color+'30'}},impl.icon+' '+impl.name),
  );
  if(tc.result) head.appendChild(h('span',{style:{marginLeft:'auto',fontFamily:'monospace',fontWeight:700,color:'var(--green)',fontSize:'12px'}},fmt(tc.result.elapsed)));
  card.appendChild(head);

  if(tc.args) {
    const args = h('div',{className:'tc-args'});
    Object.entries(tc.args).forEach(([k,v])=>{ args.appendChild(h('span',{style:{marginRight:'12px'}}, h('span',{style:{color:'var(--purple)'}},k), '='+JSON.stringify(v).slice(0,80))); });
    card.appendChild(args);
  }
  if(tc.result?.preview) {
    const lines = h('div',{className:'tc-lines'});
    tc.result.preview.forEach(line => {
      const p=line.split(':');
      lines.appendChild(h('div',{className:'tc-line'}, h('span',{className:'tc-f'},p[0]?.split('/').pop()||''), h('span',{className:'tc-n'},p[1]||''), h('span',{className:'tc-c'},p.slice(2).join(':'))));
    });
    card.appendChild(lines);
  }
  if(tc.result) {
    card.appendChild(h('div',{className:'tc-stats'},
      h('span',null,h('b',null,String(tc.result.matchCount)),' matches'),
      h('span',null,h('b',null,String(tc.result.bytes)),' bytes'),
      h('span',null,h('b',null,'~'+Math.ceil(tc.result.bytes/4)),' tokens'),
    ));
  }
  return card;
}

function buildMsgList() {

    const empty = h('div',{className:'empty'});

    // Category cards — like OpenRouter's 2x2 grid
    const cardGrid = h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',width:'100%',maxWidth:'600px',marginBottom:'32px'}});

    const categories = [
      { title:'Security Review', desc:'OWASP scan + CVE audit + secret detection', icon:'🛡', prompt:'Clone https://github.com/expressjs/express and run a full security review. Use deep_security_scan, dependency_audit, and secrets_scan.' },
      { title:'Code Intelligence', desc:'Architecture + dependencies + knowledge graph', icon:'🧠', prompt:'Clone https://github.com/walter-grace/milli-agent and build a knowledge_graph depth=3. Then show repo_summary and code_stats.' },
      { title:'Self-Heal', desc:'Find bugs, generate fixes, test in sandbox', icon:'🧬', prompt:'Clone https://github.com/walter-grace/milli-agent and run self_heal. Identify any issues and suggest fixes.' },
      { title:'API Analysis', desc:'Parse OpenAPI specs, search endpoints', icon:'📡', prompt:'Clone https://github.com/cloudflare/api-schemas and use openapi_search to find all DNS-related endpoints. Show schemas too.' },
    ];

    categories.forEach(cat => {
      const card = h('div',{style:{padding:'20px',borderRadius:'var(--radius)',border:'1px solid var(--border)',background:'var(--bg2)',cursor:'pointer',transition:'all .2s'},
        onClick:()=>{chatInput.value=cat.prompt; state.input=cat.prompt; updateSendBtn();}});
      card.addEventListener('mouseenter',()=>{card.style.borderColor='var(--purple)';card.style.transform='translateY(-2px)';card.style.boxShadow='var(--shadow-md)';});
      card.addEventListener('mouseleave',()=>{card.style.borderColor='var(--border)';card.style.transform='';card.style.boxShadow='';});
      card.appendChild(h('div',{style:{fontSize:'15px',fontWeight:600,marginBottom:'6px'}},cat.title));
      card.appendChild(h('div',{style:{fontSize:'12px',color:'var(--fg3)',lineHeight:'1.4',marginBottom:'12px'}},cat.desc));
      card.appendChild(h('div',{style:{fontSize:'20px'}},cat.icon));
      cardGrid.appendChild(card);
    });
    empty.appendChild(cardGrid);

    // Horizontal scrolling prompt chips
    const chipScroll = h('div',{style:{display:'flex',gap:'8px',overflowX:'auto',width:'100%',maxWidth:'600px',paddingBottom:'8px'}});
    const chips = [
      ['Find TODOs','Clone milli-agent and find all TODO comments'],
      ['Compare repos','Compare https://github.com/expressjs/express with https://github.com/fastify/fastify'],
      ['Git analysis','Clone milli-agent and show git_summary, git_effort, and git_authors'],
      ['Port exposure','Clone milli-agent and run port_scan to check for exposed ports'],
      ['File timeline','Clone milli-agent and run git_timeline on src/server.js'],
    ];
    chips.forEach(([label,prompt]) => {
      chipScroll.appendChild(h('button',{className:'pre',style:{whiteSpace:'nowrap',flexShrink:0,padding:'6px 14px'},onClick:()=>{chatInput.value=prompt; state.input=prompt; updateSendBtn();}},label));
    });
    empty.appendChild(chipScroll);

    inner.appendChild(empty);
  } else {
    state.msgs.forEach(msg => {
      if(msg.role==='user') {
        inner.appendChild(h('div',{className:'msg-user'},h('div',null,msg.content)));
      } else {
        const asst = h('div',{className:'msg-asst'});
        (msg.toolCalls||[]).forEach(tc => asst.appendChild(renderToolCard(tc)));
        if(msg.content) asst.appendChild(h('div',{className:'bubble'},msg.content));
        if(msg.status) asst.appendChild(h('div',{className:'loading'},h('span',{className:'spinner'}),msg.status==='searching'?'Searching...':'Thinking...'));
        if(msg.stats) {
          const costStr = msg.stats.cost != null ? '$'+msg.stats.cost.toFixed(6) : '';
          asst.appendChild(h('div',{className:'stats'},
            h('span',null,fmt(msg.stats.totalMs)+' total'),h('span',null,msg.stats.toolCalls+' calls'),
            h('span',null,msg.stats.mcpMs+'ms MCP'),h('span',null,msg.stats.inTokens+'+'+msg.stats.outTokens+' tok'),
            costStr ? h('span',{style:{color:'var(--green)',fontWeight:600}},costStr) : null,
          ));
        }
        inner.appendChild(asst);
      }
    });
  }
  return inner;
}

// Live DOM refs for the current assistant message being streamed
let liveChatEl = null;    // the .msg-asst div
let liveBubbleEl = null;  // the .bubble text div
let liveStatusEl = null;  // the .loading div
let liveStatsEl = null;   // the .stats div
let liveToolEls = [];     // array of tool card divs

function chatStartAssistant() {
  const msgArea = document.getElementById('chat-messages');
  if (!msgArea) return;
  const inner = msgArea.querySelector('.messages-inner');
  if (!inner) return;

  liveChatEl = h('div',{className:'msg-asst anim'});
  liveStatusEl = h('div',{className:'loading'},h('span',{className:'spinner'}),'Thinking...');
  liveBubbleEl = null;
  liveStatsEl = null;
  liveToolEls = [];

  liveChatEl.appendChild(liveStatusEl);
  inner.appendChild(liveChatEl);
  msgArea.scrollTop = msgArea.scrollHeight;
}

function chatAddUserMsg(content) {
  const msgArea = document.getElementById('chat-messages');
  if (!msgArea) return;
  let inner = msgArea.querySelector('.messages-inner');

  // Remove empty state if present
  const empty = inner?.querySelector('.empty');
  if (empty) { inner.innerHTML = ''; }
  if (!inner) { inner = h('div',{className:'messages-inner'}); msgArea.appendChild(inner); }

  inner.appendChild(h('div',{className:'msg-user anim'},h('div',null,content)));
  msgArea.scrollTop = msgArea.scrollHeight;
}

function chatUpdateStatus(status) {
  if (!liveStatusEl || !liveChatEl) return;
  if (!status) {
    liveStatusEl.remove();
    liveStatusEl = null;
  } else {
    liveStatusEl.innerHTML = '';
    liveStatusEl.appendChild(h('span',{className:'spinner'}));
    liveStatusEl.appendChild(document.createTextNode(status === 'searching' ? 'Searching files...' : 'Thinking...'));
    // Make sure status is at the end
    liveChatEl.appendChild(liveStatusEl);
  }
}

function chatAddToolCall(tc) {
  if (!liveChatEl) return;
  const impl = IMPLS[tc.impl] || IMPLS.cpp;
  const card = h('div',{className:'tc anim'});

  // Header with spinner
  const head = h('div',{className:'tc-head'},
    h('span',{className:'spinner'}),
    h('span',null,'Calling '),
    h('code',{style:{color:'var(--purple)',fontSize:'11px'}},'grep_search'),
    h('span',{className:'tc-badge',style:{background:impl.color+'15',color:impl.color,border:'1px solid '+impl.color+'30'}},impl.icon+' '+impl.name),
  );
  card.appendChild(head);

  // Args
  if (tc.args) {
    const args = h('div',{className:'tc-args'});
    Object.entries(tc.args).forEach(([k,v]) => {
      args.appendChild(h('span',{style:{marginRight:'12px'}}, h('span',{style:{color:'var(--purple)'}},k), '='+JSON.stringify(v).slice(0,80)));
    });
    card.appendChild(args);
  }

  // Insert before status
  if (liveStatusEl && liveStatusEl.parentNode === liveChatEl) {
    liveChatEl.insertBefore(card, liveStatusEl);
  } else {
    liveChatEl.appendChild(card);
  }
  liveToolEls.push(card);

  const msgArea = document.getElementById('chat-messages');
  if (msgArea) msgArea.scrollTop = msgArea.scrollHeight;
}

function chatUpdateToolResult(result) {
  // Find the last tool card without results
  const card = liveToolEls.find(el => !el.querySelector('.tc-lines'));
  if (!card) return;

  // Update header - replace spinner with ▶ and add time
  const head = card.querySelector('.tc-head');
  if (head) {
    head.innerHTML = '';
    const impl = IMPLS[result.impl] || IMPLS.cpp;
    head.appendChild(h('span',null,'▶'));
    head.appendChild(h('span',null,'Result from '));
    head.appendChild(h('code',{style:{color:'var(--purple)',fontSize:'11px'}},'grep_search'));
    head.appendChild(h('span',{className:'tc-badge',style:{background:impl.color+'15',color:impl.color,border:'1px solid '+impl.color+'30'}},impl.icon+' '+impl.name));
    head.appendChild(h('span',{style:{marginLeft:'auto',fontFamily:'monospace',fontWeight:700,color:'var(--green)',fontSize:'12px'}},fmt(result.elapsed)));
  }

  // Add result lines
  if (result.preview) {
    const lines = h('div',{className:'tc-lines'});
    result.preview.forEach(line => {
      const p = line.split(':');
      const row = h('div',{className:'tc-line'});
      row.appendChild(h('span',{className:'tc-f'},p[0]?.split('/').pop()||''));
      row.appendChild(h('span',{className:'tc-n'},p[1]||''));
      row.appendChild(h('span',{className:'tc-c'},p.slice(2).join(':')));
      lines.appendChild(row);
    });
    card.appendChild(lines);
  }

  // Add stats
  card.appendChild(h('div',{className:'tc-stats'},
    h('span',null,h('b',null,String(result.matchCount)),' matches'),
    h('span',null,h('b',null,String(result.bytes)),' bytes'),
    h('span',null,h('b',null,'~'+Math.ceil(result.bytes/4)),' tokens'),
  ));

  const msgArea = document.getElementById('chat-messages');
  if (msgArea) msgArea.scrollTop = msgArea.scrollHeight;
}

let chatTextTimer = null;
let chatPendingText = null;

function chatAppendText(text) {
  if (!liveChatEl) return;
  if (!liveBubbleEl) {
    liveBubbleEl = h('div',{className:'bubble'});
    if (liveStatusEl && liveStatusEl.parentNode === liveChatEl) {
      liveChatEl.insertBefore(liveBubbleEl, liveStatusEl);
    } else {
      liveChatEl.appendChild(liveBubbleEl);
    }
  }
  // Throttle text updates to avoid layout thrashing
  chatPendingText = text;
  if (chatTextTimer) return;
  chatTextTimer = setTimeout(() => {
    chatTextTimer = null;
    if (chatPendingText !== null) {
      liveBubbleEl.textContent = chatPendingText;
      chatPendingText = null;
      const msgArea = document.getElementById('chat-messages');
      if (msgArea) msgArea.scrollTop = msgArea.scrollHeight;
    }
  }, 80);
}

function chatFinish(stats) {
  if (!liveChatEl) return;
  // Flush pending text
  if (chatTextTimer) { clearTimeout(chatTextTimer); chatTextTimer = null; }
  if (chatPendingText !== null && liveBubbleEl) { liveBubbleEl.textContent = chatPendingText; chatPendingText = null; }
  // Remove status
  if (liveStatusEl) { liveStatusEl.remove(); liveStatusEl = null; }
  // Add stats bar
  if (stats) {
    const costStr = stats.cost != null ? '$'+stats.cost.toFixed(6) : '';
    liveStatsEl = h('div',{className:'stats anim'},
      h('span',null,fmt(stats.totalMs)+' total'), h('span',null,stats.toolCalls+' calls'),
      h('span',null,stats.mcpMs+'ms MCP'), h('span',null,stats.inTokens+'+'+stats.outTokens+' tok'),
      costStr ? h('span',{style:{color:'var(--green)',fontWeight:600}},costStr) : null,
    );
    liveChatEl.appendChild(liveStatsEl);
  }
  liveChatEl = null;
  liveBubbleEl = null;
  liveToolEls = [];
}

function updateChatMessages() {
  // Only used for initial render / tab switch — not during streaming
  const msgArea = document.getElementById('chat-messages');
  if (!msgArea) return;
  msgArea.innerHTML = '';
  msgArea.appendChild(buildMsgList());
  setTimeout(()=>{ msgArea.scrollTop = msgArea.scrollHeight; },50);
  updateSendBtn();
}

function updateSendBtn() {
  const btn = document.getElementById('send-btn');
  if (!btn) return;
  const active = state.input.trim() && !state.sending;
  btn.style.background = active ? 'var(--fg)' : 'var(--bg3)';
  btn.style.color = active ? 'var(--bg)' : 'var(--fg3)';
  btn.innerHTML = '';
  btn.appendChild(state.sending ? h('span',{className:'spinner'}) : document.createTextNode('↑'));
  if (chatInput) chatInput.disabled = state.sending;
}

function renderChat() {
  const main = h('div',{className:'main'});

  // Messages area
  const msgArea = h('div',{id:'chat-messages',className:'messages'});
  msgArea.appendChild(buildMsgList());
  main.appendChild(msgArea);
  setTimeout(()=>{ msgArea.scrollTop = msgArea.scrollHeight; },50);

  // Rich input area — inspired by OpenRouter
  const inputArea = h('div',{className:'input-area'});
  const wrap = h('div',{className:'input-wrap'});

  // Input container with toolbar below
  const inputBox = h('div',{style:{borderRadius:'var(--radius)',border:'1px solid var(--border)',background:'var(--bg2)',overflow:'hidden',transition:'border-color .2s, box-shadow .2s'}});
  inputBox.addEventListener('focusin',()=>{inputBox.style.borderColor='var(--purple)';inputBox.style.boxShadow='0 0 0 3px rgba(139,92,246,.15)';});
  inputBox.addEventListener('focusout',()=>{inputBox.style.borderColor='var(--border)';inputBox.style.boxShadow='';});

  chatInput = document.createElement('textarea');
  chatInput.rows = 1;
  chatInput.placeholder = 'Ask Milli-Agent anything... (paste a GitHub URL to clone and analyze)';
  chatInput.value = state.input;
  chatInput.style.cssText = 'width:100%;resize:none;border:none;background:transparent;padding:14px 16px 8px;font-size:14px;color:var(--fg);outline:none;font-family:inherit;line-height:1.5;';
  chatInput.addEventListener('input', e => {
    state.input = e.target.value;
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 160) + 'px';
    updateSendBtn();
  });
  chatInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  });
  inputBox.appendChild(chatInput);

  // Toolbar row — model selector, server, send button
  const toolbar = h('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'4px 10px 8px',borderTop:'1px solid rgba(255,255,255,.03)'}});

  // Model selector inline
  const modelSel = renderSelect('sel',state.model,state.models.map(m=>({value:m.id,label:m.name+(m.free?' ✦':'')})),v=>{state.model=v;});
  modelSel.style.cssText = 'height:26px;font-size:11px;border-radius:6px;background:var(--bg3);border:1px solid transparent;color:var(--fg2);padding:0 6px;';
  toolbar.appendChild(modelSel);

  // Server selector inline
  const implSel = renderSelect('sel',state.impl,Object.entries(IMPLS).map(([k,v])=>({value:k,label:v.icon+' '+v.name})),v=>{state.impl=v;});

async function sendChat() {
  // Sync from textarea in case state.input is stale
  if (chatInput) state.input = chatInput.value;
  if (!state.input.trim() || state.sending) return;

  const content = state.input.trim();
  state.input = '';
  if (chatInput) chatInput.value = '';
  state.sending = true;
  updateSendBtn();

  // Directly manipulate DOM — no full rebuild
  chatAddUserMsg(content);
  chatStartAssistant();

  state.msgs.push({role:'user', content});
  state.msgs.push({role:'assistant', content:'', toolCalls:[], status:'thinking', stats:null});
  const last = () => state.msgs[state.msgs.length - 1];
  let tcs = [], text = '';

  try {
    const history = state.msgs.filter(m => m.role==='user' || (m.role==='assistant' && m.content)).slice(0,-1).map(m => ({role:m.role, content:m.content}));

    const response = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: content, model: state.model, impl: state.impl, history }),
    });
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (!done) buffer += decoder.decode(value, { stream: true });
      else buffer += decoder.decode();

      const lines = buffer.split('\n');
      buffer = done ? '' : lines.pop();

      let eventType = null;
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ') && eventType) {
          try {
            const d = JSON.parse(line.slice(6));
            if (eventType === 'status') { last().status = d.type; chatUpdateStatus(d.type); }
            else if (eventType === 'tool_call') { tcs.push({name:d.name,args:d.args,impl:d.impl,result:null}); last().toolCalls=[...tcs]; chatAddToolCall(d); chatUpdateStatus('searching'); }
            else if (eventType === 'tool_result') { for(let i=tcs.length-1;i>=0;i--){if(!tcs[i].result){tcs[i].result={elapsed:d.elapsed,bytes:d.bytes,matchCount:d.matchCount,preview:d.preview};break;}} last().toolCalls=[...tcs]; chatUpdateToolResult(d); chatUpdateStatus('thinking'); }
            else if (eventType === 'text_delta') { text+=d.content; last().content=text; chatUpdateStatus(null); chatAppendText(text); }
            else if (eventType === 'text_done') { last().content=d.content; last().stats=d.stats; if(d.stats?.sessionCost) state.sessionCost=d.stats.sessionCost; chatUpdateStatus(null); chatAppendText(d.content); chatFinish(d.stats); refreshNav(); }
            else if (eventType === 'error') { last().content='Error: '+(d.message||'Unknown'); chatUpdateStatus(null); chatAppendText('Error: '+(d.message||'Unknown')); chatFinish(null); }
          } catch(parseErr) { /* skip */ }
          eventType = null;
        }
      }
      if (done) break;
    }
  } catch (err) {
    last().content = last().content || 'Error: ' + err.message;
    chatAppendText(last().content);
    chatFinish(null);
  }

  state.sending = false;
  updateSendBtn();
}

async function runDirectSearch() {
  if (!searchState.pattern.trim()) return;
  // Show F1 loading animation
  const area = document.getElementById('search-results');
  if (area) {
    area.innerHTML = '<div style="padding:40px 24px;text-align:center">' +
      '<div class="f1-loader fast" style="width:200px;margin:0 auto 16px"></div>' +
      '<div style="display:flex;align-items:center;justify-content:center;gap:8px;color:var(--green);font-size:13px;font-weight:600">' +
      '<span class="f1-dots"><span></span><span></span><span></span><span></span></span>' +
      ' Milli-speed search' +
      '</div>' +
      '<div style="color:var(--fg3);font-size:11px;margin-top:6px">ripgrep → ' + (IMPLS[searchState.impl]?.icon||'') + ' ' + (IMPLS[searchState.impl]?.name||'') + ' MCP server</div>' +
      '</div>';
  }

  // Handle GitHub URL — clone first
  let searchPath = searchState.path;
  if (searchState.repoUrl) {
    const parsed = searchState.repoUrl.match(/github\.com\/([^\/\s]+\/[^\/\s]+)/);
    if (parsed) {
      if (area) {
        area.innerHTML = '<div style="padding:40px 24px;text-align:center">' +
          '<div class="f1-loader" style="width:240px;margin:0 auto 16px"></div>' +
          '<div style="color:var(--fg2);font-size:13px;font-weight:500">Cloning ' + parsed[1] + '...</div>' +
          '<div style="color:var(--fg3);font-size:11px;margin-top:4px">This may take a few seconds for new repos</div></div>';
      }
      try {
        const resp = await fetch('/api/clone', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({repo:parsed[1]}) });
        const d = await resp.json();
        if (d.path) searchPath = d.path;
      } catch {}
      // Switch back to search animation
      if (area) {
        area.innerHTML = '<div style="padding:40px 24px;text-align:center">' +
          '<div class="f1-loader fast" style="width:200px;margin:0 auto 16px"></div>' +
          '<div style="color:var(--green);font-size:13px;font-weight:600"><span class="f1-dots"><span></span><span></span><span></span><span></span></span> Searching cloned repo</div></div>';
      }
    }
  }

  searchState.analysis = '';
  searchState.analyzing = false;
  const resp = await fetch('/api/search/direct', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ pattern:searchState.pattern, path:searchPath, impl:searchState.impl, max_results:200 }),
  });
  searchState.results = await resp.json();

  const resultsEl = document.getElementById('search-results');
  if (resultsEl) renderSearchResults(resultsEl);
}

async function runAnalysis() {
  if (!searchState.results || searchState.analyzing) return;
  searchState.analyzing = true;

  // Re-render to show "Analyzing..." button
  const analyzeArea = document.getElementById('search-results');
  if (analyzeArea) renderSearchResults(analyzeArea);

  try {
    const resp = await fetch('/api/search/analyze', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        pattern: searchState.results.pattern,
        results: searchState.results.lines.slice(0, 50).join('\n'),
        model: state.model,
      }),
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '', text = '';

    while (true) {
      const { done, value } = await reader.read();
      if (!done) buffer += decoder.decode(value, { stream:true });
      else buffer += decoder.decode();
      const lines = buffer.split('\n');
      buffer = done ? '' : lines.pop();
      let evt = null;
      for (const line of lines) {
        if (line.startsWith('event: ')) evt = line.slice(7).trim();
        else if (line.startsWith('data: ') && evt) {
          try {
            const d = JSON.parse(line.slice(6));
            if (evt === 'text_delta') {
              text += d.content;
              searchState.analysis = text;
              const el = document.getElementById('search-analysis');
              if (el) el.lastChild.textContent = text;
              else { const a2 = document.getElementById('search-results'); if (a2) renderSearchResults(a2); }
            }
            if (evt === 'text_done') { searchState.analysis = d.content; if(d.cost) state.sessionCost += d.cost; refreshNav(); }
          } catch {}
          evt = null;
        }
      }
      if (done) break;
    }
  } catch (err) {
    searchState.analysis = 'Error: ' + err.message;
  }
  searchState.analyzing = false;
  const finalArea = document.getElementById('search-results');
  if (finalArea) renderSearchResults(finalArea);
}

// Throttled compare update — max 4 updates/sec to avoid jank
let cmpUpdateTimer = null;
let cmpNeedsUpdate = false;

function scheduleCompareUpdate() {
  cmpNeedsUpdate = true;
  if (cmpUpdateTimer) return;
  cmpUpdateTimer = setTimeout(() => {
    cmpUpdateTimer = null;
    if (cmpNeedsUpdate) { cmpNeedsUpdate = false; doCompareUpdate(); }
  }, 250);
}

      html += '<code style="color:var(--purple)">grep_search</code>';
      if (tc.result) {
        html += '<span style="margin-left:auto;color:var(--green);font-family:monospace;font-weight:600;font-size:10px">'+fmt(tc.result.elapsed)+' · '+tc.result.matchCount+' hits</span>';
      } else {
        html += '<span class="spinner" style="margin-left:auto"></span>';
      }
      html += '</div>';
      if (tc.result?.preview) {
        html += '<div style="max-height:100px;overflow-y:auto;font-size:11px;font-family:monospace">';
        tc.result.preview.slice(0,6).forEach(l => {
          const p = l.split(':');
          const f = (p[0]||'').split('/').pop()||'';
          const n = p[1]||'';
          const c = p.slice(2).join(':').replace(/</g,'&lt;');
          html += '<div class="tc-line"><span class="tc-f">'+f+'</span><span class="tc-n">'+n+'</span><span class="tc-c">'+c+'</span></div>';
        });
        html += '</div>';
      }
      html += '</div>';
    });
    // Text content
    if (r.content) {
      const safe = r.content.slice(0,600).replace(/</g,'&lt;').replace(/\n/g,'<br>') + (r.content.length>600?'...':'');
      html += '<div style="font-size:12px;line-height:1.5;color:var(--fg2);margin-top:6px">'+safe+'</div>';
    }
  }
  return html;
}

function renderCardHeaderHTML(implId) {
  const impl = IMPLS[implId];
  const r = cmpState.results[implId];
  let html = '<span style="font-size:12px;font-weight:600;color:'+impl.color+'">'+impl.icon+' '+impl.name+'</span>';
  if (r?.stats) {
    const col = r.fastest ? 'var(--green)' : 'var(--fg3)';
    html += '<span style="font-size:11px;font-family:monospace;color:'+col+';margin-left:4px">'+fmt(r.stats.totalMs)+'</span>';
    html += '<span style="margin-left:auto;font-size:10px;color:var(--fg3)">'+r.stats.inTokens+'+'+r.stats.outTokens+' tok</span>';
    if (r.stats.cost) html += '<span style="font-size:10px;font-weight:600;color:var(--green);margin-left:6px">$'+r.stats.cost.toFixed(5)+'</span>';

  if (r?.fastest) html += '<span style="font-size:10px;font-weight:700;color:var(--green);margin-left:6px">FASTEST</span>';

function initCompareGrid() {
  const area = document.getElementById('compare-results');
  if (!area) return;
  area.innerHTML = '';

    area.innerHTML = '<div style="margin-bottom:16px;padding:10px 14px;background:var(--fg);color:var(--bg);border-radius:12px;max-width:70%;margin-left:auto;font-size:14px">'+cmpState.userMsg.replace(/</g,'&lt;')+'</div>';
  }
  let gridHTML = '<div id="compare-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
  Object.entries(IMPLS).forEach(([id, impl]) => {

    gridHTML += '<div id="cmp-body-'+id+'" style="padding:10px;max-height:350px;overflow-y:auto">'+renderCardHTML(id)+'</div>';

function doCompareUpdate() {
  if (!document.getElementById('compare-grid')) {
    initCompareGrid();
    return;
  }
  Object.keys(IMPLS).forEach(id => {
    const r = cmpState.results[id];
    const card = document.getElementById('cmp-card-'+id);
    if (!card) return;
    card.style.borderColor = r?.fastest ? 'var(--green)' : 'var(--border)';
    const head = document.getElementById('cmp-head-'+id);
    if (head) head.innerHTML = renderCardHeaderHTML(id);
    const body = document.getElementById('cmp-body-'+id);
    if (body) body.innerHTML = renderCardHTML(id);
  });
}

function updateCompareResults() {
  scheduleCompareUpdate();
}

async function sendCompare() {
  if(compareInput) cmpState.input = compareInput.value;
  if(!cmpState.input.trim()||cmpState.sending) return;
  const content = cmpState.input.trim();
  cmpState.userMsg = content;
  cmpState.input = '';
  if(compareInput) compareInput.value = '';
  cmpState.sending = true;
  cmpState.results = {};
  Object.keys(IMPLS).forEach(id => { cmpState.results[id] = {status:'thinking',content:'',toolCalls:[],stats:null,done:false,fastest:false}; });
  updateCompareResults();

  let completedCount = 0;
  const completionTimes = {};
  const implIds = Object.keys(IMPLS);

  const delay = (ms) => new Promise(r => setTimeout(r, ms));
  await Promise.all(implIds.map(async (implId, idx) => {
    await delay(idx * 1500); // stagger 1.5s apart to avoid rate limiting
    try {
      const response = await fetch('/api/chat/stream', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({message:content, model:state.model, impl:implId, history:[]}),
      });
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer='', tcs=[], text='';
      while(true) {
        const {done,value} = await reader.read();
        if(!done) buffer+=decoder.decode(value,{stream:true}); else buffer+=decoder.decode();
        const lines=buffer.split('\n'); buffer=done?'':lines.pop();
        let evt=null;
        for(const line of lines) {
          if(line.startsWith('event: ')) evt=line.slice(7).trim();
          else if(line.startsWith('data: ')&&evt) {
            try {
              const d=JSON.parse(line.slice(6));
              if(evt==='status'){cmpState.results[implId].status=d.type;updateCompareResults();}
              else if(evt==='tool_call'){tcs.push({name:d.name,args:d.args,impl:implId,result:null});cmpState.results[implId].toolCalls=[...tcs];cmpState.results[implId].status='searching';updateCompareResults();}
              else if(evt==='tool_result'){for(let i=tcs.length-1;i>=0;i--){if(!tcs[i].result){tcs[i].result={elapsed:d.elapsed,bytes:d.bytes,matchCount:d.matchCount,preview:d.preview};break;}}cmpState.results[implId].toolCalls=[...tcs];cmpState.results[implId].status='thinking';updateCompareResults();}
              else if(evt==='text_delta'){text+=d.content;cmpState.results[implId].content=text;cmpState.results[implId].status=null;updateCompareResults();}
              else if(evt==='text_done'){
                cmpState.results[implId].content=d.content;cmpState.results[implId].stats=d.stats;cmpState.results[implId].status=null;cmpState.results[implId].done=true;
                completionTimes[implId]=d.stats?.totalMs||999999;completedCount++;
                if(completedCount===implIds.length){const fastest=Object.entries(completionTimes).sort((a,b)=>a[1]-b[1])[0][0];cmpState.results[fastest].fastest=true;}
                updateCompareResults();
              }
            }catch{}
            evt=null;
          }
        }
        if(done) break;
      }
    } catch(err) {
      cmpState.results[implId].content='Error: '+err.message;cmpState.results[implId].status=null;cmpState.results[implId].done=true;completedCount++;updateCompareResults();
    }
  }));
  cmpState.sending=false; updateCompareResults();
}

let apiState = { specContent: null, specName: '', specPath: '', query: '', mode: 'endpoints', results: null, raceResults: null, racing: false, searching: false, uploaded: false };

function renderAPI() {
  const main = h('div',{style:{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}});

  fileLabel.textContent = apiState.uploaded ? apiState.specName : 'Upload YAML/JSON spec...';

  fileInput.type = 'file';
  fileInput.accept = '.json,.yaml,.yml';
  fileInput.style.display = 'none';
  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    apiState.specName = file.name;
    apiState.specContent = await file.text();
    fileLabel.textContent = file.name + ' (' + (apiState.specContent.length / 1024).toFixed(0) + 'KB)';
    fileLabel.style.borderColor = 'var(--green)';
    // Upload to server
    const resp = await fetch('/api/openapi/upload', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ content: apiState.specContent, filename: file.name })
    });
    const d = await resp.json();
    if (d.path) { apiState.specPath = d.path; apiState.uploaded = true; }
  });
  fileLabel.appendChild(fileInput);
  uploadRow.appendChild(fileLabel);

  // Or paste GitHub URL
  uploadRow.appendChild(h('span',{style:{color:'var(--fg3)',fontSize:'12px'}},'or'));
  const urlInput = document.createElement('input');
  urlInput.className = 'sinput';
  urlInput.placeholder = 'GitHub URL with OpenAPI spec...';
  urlInput.style.cssText = 'flex:1;font-size:12px;';
  urlInput.addEventListener('keydown', async (e) => {
    if (e.key !== 'Enter') return;
    const url = urlInput.value.trim();
    if (!url) return;
    const parsed = url.match(/github\.com\/([^\/\s]+\/[^\/\s]+)/);
    if (parsed) {
      fileLabel.textContent = 'Cloning ' + parsed[1] + '...';
      const resp = await fetch('/api/clone', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ repo: parsed[1] }) });
      const d = await resp.json();
      if (d.path) { apiState.specPath = d.path; apiState.specName = parsed[1]; apiState.uploaded = true; fileLabel.textContent = parsed[1]; fileLabel.style.borderColor = 'var(--green)'; }
    }
  });

  top.appendChild(uploadRow);

  // Search controls
  const searchRow = h('div',{style:{display:'flex',gap:'8px',marginBottom:'12px'}});
  const queryInput = document.createElement('input');
  queryInput.className = 'sinput';
  queryInput.placeholder = 'Search query (endpoint, schema, keyword)...';
  queryInput.value = apiState.query;
  queryInput.style.flex = '1';
  queryInput.addEventListener('input', e => apiState.query = e.target.value);

    if (m === apiState.mode) opt.selected = true;
    modeSelect.appendChild(opt);
  });

  const raceBtn = h('button',{className:'sbtn',style:{background:'var(--purple)',color:'#fff'},onClick:runAPIRace}, apiState.racing ? 'Racing...' : 'Race All');

    ['GitHub API','github/rest-api-description'],

    resultsArea.appendChild(h('div',{style:{textAlign:'center',color:'var(--fg3)',paddingTop:'80px',fontSize:'14px'}},'Upload a spec or select a preset — then search or race'));
  }

  return main;
}

function renderAPIResults(container) {
  const r = apiState.results;
  container.innerHTML = '';

  // Stats bar
  const statsBar = h('div',{style:{display:'flex',alignItems:'center',gap:'12px',padding:'10px 24px',borderBottom:'1px solid var(--border)',fontSize:'12px',background:'var(--bg2)'}});
  statsBar.appendChild(h('span',{style:{color:'var(--green)',fontWeight:700,fontFamily:'monospace',fontSize:'14px'}},fmt(r.elapsed)));
  statsBar.appendChild(h('span',{style:{color:'var(--fg2)'}},r.bytes + ' bytes'));
  statsBar.appendChild(h('span',{style:{color:'var(--fg3)'}},'~' + Math.ceil(r.bytes/4) + ' tokens'));
  statsBar.appendChild(h('span',{style:{color:IMPLS[r.impl]?.color||'var(--fg3)',fontWeight:600}},(IMPLS[r.impl]?.icon||'') + ' ' + (r.impl||'node')));
  container.appendChild(statsBar);

  // Text results — render as pre-formatted
  const code = h('pre',{style:{padding:'16px 24px',fontSize:'12px',fontFamily:'JetBrains Mono,monospace',lineHeight:'1.6',color:'var(--fg2)',whiteSpace:'pre-wrap',margin:0}});
  code.textContent = r.text || 'No results';
  container.appendChild(code);
}

function renderAPIRaceResults(container) {
  container.innerHTML = '';
  const results = apiState.raceResults;
  const impls = Object.keys(results).sort((a,b) => (results[a].elapsed||9999) - (results[b].elapsed||9999));
  const fastest = impls[0];

  // Race results header
  const header = h('div',{style:{padding:'12px 24px',borderBottom:'1px solid var(--border)',background:'var(--bg2)'}});
  header.appendChild(h('div',{style:{fontSize:'14px',fontWeight:700,marginBottom:'8px'}},'Race Results'));

  // Bar chart
  const maxMs = Math.max(...Object.values(results).map(r => r.elapsed || 0));
  impls.forEach(id => {
    const r = results[id];
    const impl = IMPLS[id] || { name: id, color: '#888', icon: '' };
    const pct = maxMs > 0 ? Math.max(5, (r.elapsed / maxMs) * 100) : 100;
    const lane = h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'6px'}});
    lane.appendChild(h('span',{style:{width:'80px',fontSize:'12px',fontWeight:600,color:impl.color}},impl.icon + ' ' + impl.name));
    const track = h('div',{style:{flex:1,height:'24px',background:'var(--bg)',borderRadius:'6px',overflow:'hidden'}});
    const fill = h('div',{style:{height:'100%',width:pct+'%',background:id===fastest?'var(--green)':impl.color,borderRadius:'6px',animation:'barGrow 0.5s ease-out',display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:'8px'}});
    fill.appendChild(h('span',{style:{fontSize:'10px',fontWeight:700,color:'#fff',fontFamily:'monospace'}},fmt(r.elapsed)));
    track.appendChild(fill);
    lane.appendChild(track);
    lane.appendChild(h('span',{style:{width:'60px',fontSize:'10px',color:'var(--fg3)',textAlign:'right'}},r.bytes + 'b'));
    if (id === fastest) lane.appendChild(h('span',{style:{fontSize:'10px',fontWeight:700,color:'var(--green)'}},'WIN'));
    header.appendChild(lane);
  });
  container.appendChild(header);

  // Detailed results per impl
  const grid = h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',padding:'16px 24px'}});
  impls.forEach(id => {
    const r = results[id];
    const impl = IMPLS[id] || { name: id, color: '#888', icon: '' };
    const card = h('div',{style:{borderRadius:'12px',border:'1px solid '+(id===fastest?'var(--green)':'var(--border)'),overflow:'hidden',background:'var(--bg2)'}});
    const hd = h('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'8px 12px',borderBottom:'1px solid var(--bg3)',borderTop:'2px solid '+impl.color}});
    hd.appendChild(h('span',{style:{fontSize:'12px',fontWeight:600,color:impl.color}},impl.icon + ' ' + (impl.name || id)));
    hd.appendChild(h('span',{style:{fontSize:'11px',fontFamily:'monospace',color:id===fastest?'var(--green)':'var(--fg3)'}},fmt(r.elapsed)));
    hd.appendChild(h('span',{style:{marginLeft:'auto',fontSize:'10px',color:'var(--fg3)'}},r.bytes+'b'));
    if (id === fastest) hd.appendChild(h('span',{style:{fontSize:'10px',fontWeight:700,color:'var(--green)',marginLeft:'6px'}},'FASTEST'));
    card.appendChild(hd);
    const body = h('pre',{style:{padding:'8px 12px',maxHeight:'200px',overflowY:'auto',fontSize:'10px',fontFamily:'monospace',lineHeight:'1.5',color:'var(--fg2)',whiteSpace:'pre-wrap',margin:0}});
    body.textContent = r.text || 'Error';
    card.appendChild(body);
    grid.appendChild(card);
  });
  container.appendChild(grid);
}

async function runAPISearch() {
  if (!apiState.specPath || apiState.searching) return;
  apiState.searching = true;
  apiState.raceResults = null;
  const area = document.getElementById('api-results');
  if (area) area.innerHTML = '<div style="padding:40px;text-align:center"><div class="f1-loader fast" style="width:200px;margin:0 auto 16px"></div><div style="color:var(--green);font-size:13px;font-weight:600"><span class="f1-dots"><span></span><span></span><span></span><span></span></span> Searching spec</div></div>';

  try {
    const resp = await fetch('/api/openapi/search', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ path: apiState.specPath, query: apiState.query, mode: apiState.mode, impl: state.impl })
    });
    apiState.results = await resp.json();
  } catch (e) {
    apiState.results = { text: 'Error: ' + e.message, elapsed: 0, bytes: 0 };
  }
  apiState.searching = false;
  const el = document.getElementById('api-results');
  if (el) renderAPIResults(el);
}

async function runAPIRace() {
  if (!apiState.specPath || apiState.racing) return;
  apiState.racing = true;
  apiState.results = null;
  const area = document.getElementById('api-results');
  if (area) area.innerHTML = '<div style="padding:40px;text-align:center"><div class="f1-loader" style="width:240px;margin:0 auto 16px"></div><div style="color:var(--green);font-size:13px;font-weight:600"><span class="f1-dots"><span></span><span></span><span></span><span></span></span> Racing all servers...</div></div>';

  try {
    const resp = await fetch('/api/openapi/race', {
      method: 'POST', headers: {'Content-Type':'application/json'},

  } catch (e) {
    apiState.raceResults = { node: { text: 'Error: ' + e.message, elapsed: 0, bytes: 0 } };

  apiState.racing = false;
  const el = document.getElementById('api-results');
  if (el) renderAPIRaceResults(el);
}

function renderWhiteHatResults(container) {
  container.innerHTML = '';

  // Summary bar if complete
  if (whState.complete) {
    const c = whState.complete;
    const severity = c.totalFindings > 20 ? '#ef4444' : c.totalFindings > 5 ? '#f59e0b' : '#22c55e';
    const grade = c.totalFindings === 0 ? 'A+' : c.totalFindings < 3 ? 'A' : c.totalFindings < 10 ? 'B' : c.totalFindings < 20 ? 'C' : 'D';
    const bar = h('div',{style:{display:'flex',alignItems:'center',gap:'16px',padding:'16px 20px',borderRadius:'12px',background:'var(--bg2)',border:'2px solid '+severity,marginBottom:'16px'}});
    bar.appendChild(h('div',{style:{fontSize:'36px',fontWeight:800,color:severity,fontFamily:'monospace'}},grade));
    bar.appendChild(h('div',null,
      h('div',{style:{fontSize:'14px',fontWeight:700}},c.totalFindings + ' potential issues found'),
      h('div',{style:{fontSize:'12px',color:'var(--fg3)'}},c.scanCount + ' scans completed'),
    ));
    container.appendChild(bar);
  }

  // Step cards
  whState.steps.forEach(step => {
    const card = h('div',{style:{borderRadius:'12px',border:'1px solid var(--border)',overflow:'hidden',background:'var(--bg2)',marginBottom:'12px'}});

    // Header
    const statusColor = step.status === 'done' ? 'var(--green)' : step.status === 'error' ? '#ef4444' : '#f59e0b';
    const statusIcon = step.status === 'done' ? '✓' : step.status === 'error' ? '✗' : '⟳';
    const hd = h('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'10px 14px',borderBottom:'1px solid var(--bg3)',cursor:'pointer'},onClick:()=>{
      const body = card.querySelector('.wh-body');
      if (body) body.style.display = body.style.display === 'none' ? 'block' : 'none';
    }});
    hd.appendChild(h('span',{style:{color:statusColor,fontWeight:700,fontSize:'14px'}},statusIcon));
    hd.appendChild(h('span',{style:{fontWeight:600,fontSize:'13px'}},step.label));
    if (step.elapsed) hd.appendChild(h('span',{style:{marginLeft:'auto',fontFamily:'monospace',fontSize:'11px',color:'var(--fg3)'}},step.elapsed+'ms'));
    if (step.findings > 0) hd.appendChild(h('span',{style:{fontSize:'10px',fontWeight:700,color:'#ef4444',padding:'2px 8px',borderRadius:'6px',background:'rgba(239,68,68,0.1)'}},step.findings+' issues'));
    if (step.status === 'running') hd.appendChild(h('span',{className:'spinner',style:{marginLeft:'auto'}}));
    card.appendChild(hd);

    // Body (collapsed by default for done steps, open for running)
    if (step.text) {
      const body = h('pre',{className:'wh-body',style:{padding:'10px 14px',maxHeight:'300px',overflowY:'auto',fontSize:'11px',fontFamily:'JetBrains Mono,monospace',lineHeight:'1.5',color:'var(--fg2)',whiteSpace:'pre-wrap',margin:0,display:step.findings > 0 ? 'block' : 'none'}});
      body.textContent = step.text;
      card.appendChild(body);
    }

    container.appendChild(card);
  });
}

async function runWhiteHatAudit() {
  if (whState.scanning || !whState.repo.trim()) return;
  whState.scanning = true;
  whState.steps = [];
  whState.complete = null;
  currentTab = null; render();

  // Show warp animation
  const el = document.getElementById('wh-results');
  if (el) {
    el.innerHTML = '';
    el.appendChild(buildWarpAnimation('Initializing', 'Preparing security scan pipeline...'));
  }

  // Parse repo
  let repo = whState.repo.trim();
  const ghMatch = repo.match(/github\.com\/([^\/\s]+\/[^\/\s]+)/);
  if (ghMatch) repo = ghMatch[1];

  try {
    const response = await fetch('/api/security/audit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ repo }),
    });
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (!done) buffer += decoder.decode(value, { stream: true });
      else buffer += decoder.decode();

      const lines = buffer.split('\n');
      buffer = done ? '' : lines.pop();

      let evt = null;
      for (const line of lines) {
        if (line.startsWith('event: ')) evt = line.slice(7).trim();
        else if (line.startsWith('data: ') && evt) {
          try {
            const d = JSON.parse(line.slice(6));
            if (evt === 'step') {
              // Update or add step
              const existing = whState.steps.find(s => s.name === d.name);
              if (existing) {
                Object.assign(existing, d);
              } else {
                whState.steps.push(d);
              }
              // Update warp animation text while scanning
              if (d.status === 'running') {
                updateWarpStatus(d.label || 'Scanning', `Step ${whState.steps.length}/7`);
              }
              // Once first result comes in, stop warp and switch to results
              const doneSteps = whState.steps.filter(s => s.status === 'done' || s.status === 'error');
              if (doneSteps.length >= 1) {
                stopWarp();
                const el = document.getElementById('wh-results');
                if (el) renderWhiteHatResults(el);
              }
            }
            if (evt === 'complete') {
              whState.complete = d;
              const el = document.getElementById('wh-results');
              if (el) renderWhiteHatResults(el);
            }
          } catch {}
          evt = null;
        }
      }
      if (done) break;
    }
  } catch (e) {
    whState.steps.push({ name: 'error', status: 'error', label: 'Audit failed: ' + e.message });
  }

  whState.scanning = false;
  const el = document.getElementById('wh-results');
  if (el) renderWhiteHatResults(el);
}

      if (!done) buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = done ? '' : lines.pop();
      let evt = null;
      for (const line of lines) {
        if (line.startsWith('event: ')) evt = line.slice(7).trim();

function renderHealStep(container, step) {

  const labels = { clone:'Clone', diagnose:'Diagnose', fix:'AI Fix Plan' };
  const hd = h('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'10px 14px',borderBottom:'1px solid var(--bg3)'}},
    h('span',{style:{color:statusColor,fontWeight:700}},icon),
