<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milli-Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { --bg:#09090b; --bg2:#18181b; --bg3:#27272a; --border:#3f3f46; --fg:#fafafa; --fg2:#a1a1aa; --fg3:#71717a; --purple:#8b5cf6; --green:#22c55e; --red:#ef4444; --yellow:#f59e0b; --blue:#3b82f6;
  --sidebar-w:220px; --radius:12px; --radius-sm:8px; --shadow-sm:0 1px 2px rgba(0,0,0,.3); --shadow-md:0 4px 12px rgba(0,0,0,.4); --shadow-lg:0 8px 24px rgba(0,0,0,.5); }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; background:var(--bg); color:var(--fg); font-family:'Inter',system-ui,sans-serif; font-size:14px; -webkit-font-smoothing:antialiased; }
code,.mono { font-family:'JetBrains Mono',monospace; }
::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-thumb { background:#333; border-radius:99px; }
::selection { background:var(--purple); color:#fff; }
@keyframes spin { to{transform:rotate(360deg);} }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px);} to{opacity:1;transform:translateY(0);} }
@keyframes slideIn { from{opacity:0;transform:translateX(-8px);} to{opacity:1;transform:translateX(0);} }
@keyframes barGrow { from{width:0;} }
@keyframes pulse { 0%,100%{opacity:.4;} 50%{opacity:1;} }
@keyframes shimmer { 0%{background-position:-200% 0;} 100%{background-position:200% 0;} }
@keyframes f1scan { 0%{left:-30%;} 100%{left:130%;} }
@keyframes f1pulse { 0%,100%{opacity:0.2;transform:scale(0.8);} 50%{opacity:1;transform:scale(1.3);} }

/* Skeleton loader */
.skeleton { background:linear-gradient(90deg,var(--bg3) 25%,#333 50%,var(--bg3) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:var(--radius-sm); }

/* F1 loader */
.f1-loader { position:relative; height:3px; background:var(--bg3); overflow:hidden; border-radius:2px; }
.f1-loader::after { content:''; position:absolute; top:0; left:-30%; width:30%; height:100%; background:linear-gradient(90deg, transparent, var(--green), var(--green), transparent); animation:f1scan 0.7s ease-in-out infinite; border-radius:2px; }
.f1-loader.fast::after { animation-duration:0.4s; background:linear-gradient(90deg, transparent, #00ff88, #00ff88, transparent); }
.f1-dots { display:inline-flex; gap:3px; align-items:center; }
.f1-dots span { width:4px; height:4px; border-radius:50%; background:var(--green); animation:f1pulse 0.6s ease-in-out infinite; }
.f1-dots span:nth-child(2) { animation-delay:0.1s; }
.f1-dots span:nth-child(3) { animation-delay:0.2s; }
.f1-dots span:nth-child(4) { animation-delay:0.3s; }

/* Toast */
.toast { position:fixed; bottom:24px; right:24px; padding:10px 16px; border-radius:var(--radius-sm); background:var(--bg3); border:1px solid var(--border); color:var(--fg2); font-size:13px; z-index:999; animation:fadeIn .3s ease-out; box-shadow:var(--shadow-md); }
.toast.success { border-color:var(--green); color:var(--green); }
.toast.error { border-color:var(--red); color:var(--red); }

/* Layout — sidebar + content */
#app { display:flex; height:100vh; }
.sidebar { width:var(--sidebar-w); flex-shrink:0; display:flex; flex-direction:column; border-right:1px solid var(--border); background:var(--bg); }
.sidebar-logo { padding:20px 16px 16px; display:flex; align-items:center; gap:10px; }
.sidebar-logo h1 { font-size:16px; font-weight:800; letter-spacing:-0.5px; }
.sidebar-logo span { font-size:10px; color:var(--green); font-family:monospace; font-weight:600; padding:2px 6px; border-radius:4px; background:rgba(34,197,94,.1); }
.sidebar-nav { flex:1; padding:4px 8px; }
.sidebar-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:var(--radius-sm); font-size:13px; font-weight:500; color:var(--fg3); cursor:pointer; transition:all .15s; border:none; background:none; width:100%; text-align:left; }
.sidebar-item:hover { background:var(--bg2); color:var(--fg2); }
.sidebar-item.active { background:var(--bg3); color:var(--fg); box-shadow:var(--shadow-sm); }
.sidebar-item .icon { width:18px; text-align:center; font-size:14px; }
.sidebar-item .badge { margin-left:auto; font-size:9px; padding:1px 6px; border-radius:4px; font-weight:700; font-family:monospace; }
.sidebar-footer { padding:12px 16px; border-top:1px solid var(--border); }
.sidebar-footer .sel { width:100%; margin-bottom:6px; height:30px; font-size:12px; border-radius:var(--radius-sm); }
.sidebar-stats { display:flex; flex-wrap:wrap; gap:6px; }
.sidebar-stat { font-size:10px; font-family:monospace; padding:2px 6px; border-radius:4px; }

.content { flex:1; overflow:hidden; display:flex; flex-direction:column; }

/* Shared components */
.main { flex:1; overflow:hidden; display:flex; flex-direction:column; }
.messages { flex:1; overflow-y:auto; padding:24px 16px; }
.messages-inner { max-width:768px; margin:0 auto; }
.msg-user { display:flex; justify-content:flex-end; margin-bottom:16px; animation:fadeIn .3s ease-out; }
.msg-user > div { background:linear-gradient(135deg, var(--purple), #7c3aed); color:#fff; border-radius:var(--radius) var(--radius) 4px var(--radius); padding:10px 14px; font-size:14px; max-width:75%; box-shadow:var(--shadow-sm); }
.msg-asst { margin-bottom:20px; animation:fadeIn .3s ease-out; }
.bubble { background:var(--bg2); border:1px solid var(--border); border-radius:4px var(--radius) var(--radius) var(--radius); padding:14px 18px; font-size:14px; max-width:85%; line-height:1.7; }
.bubble h1,.bubble h2,.bubble h3,.bubble h4 { font-weight:700; margin:14px 0 6px; line-height:1.3; }
.bubble h1 { font-size:20px; }
.bubble h2 { font-size:17px; color:var(--fg); border-bottom:1px solid var(--border); padding-bottom:4px; }
.bubble h3 { font-size:15px; color:var(--fg); }
.bubble h4 { font-size:14px; color:var(--fg2); }
.bubble p { margin:8px 0; }
.bubble ul,.bubble ol { margin:8px 0 8px 22px; }
.bubble li { margin:3px 0; }
.bubble strong { font-weight:700; color:var(--fg); }
.bubble em { font-style:italic; color:var(--fg2); }
.bubble code { background:rgba(139,92,246,.12); color:#e879f9; padding:1px 6px; border-radius:4px; font-size:12px; font-family:'JetBrains Mono',monospace; }
.bubble pre { background:#0a0a0a; border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin:10px 0; overflow-x:auto; }
.bubble pre code { background:transparent; color:#d4d4d8; padding:0; font-size:12px; }
.bubble a { color:var(--purple); text-decoration:underline; }
.bubble blockquote { border-left:3px solid var(--purple); padding-left:12px; margin:8px 0; color:var(--fg2); font-style:italic; }
.bubble hr { border:none; border-top:1px solid var(--border); margin:14px 0; }
.bubble table { border-collapse:collapse; margin:10px 0; font-size:13px; }
.bubble th,.bubble td { border:1px solid var(--border); padding:6px 10px; text-align:left; }
.bubble th { background:var(--bg3); font-weight:600; }
.stats { display:flex; flex-wrap:wrap; gap:12px; margin-top:8px; font-size:11px; color:var(--fg3); }
.loading { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--fg3); margin-top:4px; }
.spinner { width:14px; height:14px; border:2px solid var(--bg3); border-top:2px solid var(--purple); border-radius:50%; display:inline-block; animation:spin .7s linear infinite; }

/* Tool call cards */
.tc { border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; background:var(--bg2); margin-bottom:12px; max-width:85%; animation:slideIn .3s ease-out; box-shadow:var(--shadow-sm); }
.tc-head { display:flex; align-items:center; gap:8px; padding:8px 12px; font-size:13px; color:var(--fg2); cursor:pointer; transition:background .15s; }
.tc-head:hover { background:rgba(255,255,255,.02); }
.tc-badge { font-size:10px; padding:2px 8px; border-radius:6px; font-weight:600; font-family:monospace; }
.tc-args { border-top:1px solid var(--bg3); padding:6px 12px; font-size:11px; font-family:monospace; color:var(--fg3); background:rgba(0,0,0,.2); }
.tc-lines { border-top:1px solid var(--bg3); max-height:200px; overflow-y:auto; font-size:11px; font-family:monospace; animation:fadeIn 0.2s ease-out; }
.tc-line { display:flex; padding:2px 12px; transition:background .1s; }
.tc-line:hover { background:rgba(139,92,246,.06); }
.tc-f { color:var(--purple); width:110px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tc-n { color:var(--fg3); width:40px; text-align:right; margin-right:8px; flex-shrink:0; }
.tc-c { color:#d4d4d8; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tc-stats { border-top:1px solid var(--bg3); display:flex; gap:16px; padding:6px 12px; font-size:10px; color:var(--fg3); animation:fadeIn 0.3s ease-out; }

/* Input area */
.input-area { padding:12px 16px 16px; border-top:1px solid var(--border); flex-shrink:0; background:var(--bg); }
.input-wrap { max-width:768px; margin:0 auto; position:relative; }
.input-wrap textarea { width:100%; resize:none; border-radius:var(--radius); border:1px solid var(--border); background:var(--bg2); padding:12px 56px 12px 16px; font-size:14px; color:var(--fg); outline:none; font-family:inherit; line-height:1.5; transition:border-color .2s, box-shadow .2s; }
.input-wrap textarea:focus { border-color:var(--purple); box-shadow:0 0 0 3px rgba(139,92,246,.15); }
.send-btn { position:absolute; right:8px; top:8px; width:36px; height:36px; border-radius:10px; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; transition:all .15s; }
.send-btn:hover { transform:scale(1.05); }

/* Empty states */
.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; animation:fadeIn .5s ease-out; }
.empty-icon { width:64px; height:64px; border-radius:20px; background:linear-gradient(135deg, var(--bg3), var(--bg2)); display:flex; align-items:center; justify-content:center; font-size:28px; margin-bottom:20px; box-shadow:var(--shadow-md); }
.sugg-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; width:100%; max-width:560px; margin-top:24px; }
.sugg { text-align:left; font-size:13px; padding:12px 16px; border-radius:var(--radius); border:1px solid var(--border); background:var(--bg2); color:var(--fg2); cursor:pointer; line-height:1.4; transition:all .2s; }
.sugg:hover { border-color:var(--purple); color:var(--fg); transform:translateY(-1px); box-shadow:var(--shadow-sm); }

/* Search, Compare shared */
.sinput { flex:1; padding:10px 14px; font-size:13px; font-family:monospace; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--fg); outline:none; transition:border-color .2s, box-shadow .2s; }
.sinput:focus { border-color:var(--purple); box-shadow:0 0 0 3px rgba(139,92,246,.12); }
.sbtn { padding:10px 20px; font-size:13px; font-weight:600; background:var(--fg); color:var(--bg); border:none; border-radius:var(--radius-sm); cursor:pointer; transition:all .15s; }
.sbtn:hover { transform:translateY(-1px); box-shadow:var(--shadow-sm); }
.sbtn:disabled { opacity:.3; }
.pre { font-size:11px; font-family:monospace; padding:4px 10px; border-radius:6px; border:1px solid var(--border); background:none; color:var(--fg2); cursor:pointer; transition:all .15s; }
.pre:hover { border-color:var(--purple); color:var(--fg); background:rgba(139,92,246,.06); }

/* Race/compare */
.track { flex:1; height:24px; background:var(--bg); border-radius:6px; overflow:hidden; }
.fill { height:100%; border-radius:6px; animation:barGrow .5s ease-out; }
.rcard { border-radius:var(--radius); border:1px solid var(--border); overflow:hidden; background:var(--bg2); transition:all 0.3s; }
.rcard:hover { box-shadow:var(--shadow-md); }
.rhead { display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--bg3); }

/* CMD+K modal */
.cmdk-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; backdrop-filter:blur(4px); animation:fadeIn .15s; }
.cmdk { position:fixed; top:20%; left:50%; transform:translateX(-50%); width:560px; max-height:400px; background:var(--bg2); border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow-lg); z-index:101; overflow:hidden; animation:fadeIn .2s ease-out; }
.cmdk input { width:100%; padding:16px 20px; font-size:16px; background:transparent; border:none; border-bottom:1px solid var(--border); color:var(--fg); outline:none; font-family:inherit; }
.cmdk-results { max-height:300px; overflow-y:auto; padding:8px; }
.cmdk-item { padding:10px 12px; border-radius:var(--radius-sm); cursor:pointer; display:flex; align-items:center; gap:10px; font-size:13px; color:var(--fg2); transition:background .1s; }
.cmdk-item:hover,.cmdk-item.active { background:var(--bg3); color:var(--fg); }
.cmdk-item .shortcut { margin-left:auto; font-size:10px; font-family:monospace; color:var(--fg3); padding:2px 6px; border-radius:4px; background:var(--bg); }

/* ═══ Warp Speed / Interstellar Loading Animation ═══ */
.warp-container {
  position:relative; width:100%; height:300px; overflow:hidden;
  background:radial-gradient(ellipse at center, #0a0015 0%, #000 70%);
  border-radius:var(--radius); margin-bottom:16px;
  display:flex; align-items:center; justify-content:center;
}

/* Star field — 3 layers at different speeds */
.warp-stars {
  position:absolute; inset:0; overflow:hidden;
}
.warp-stars div {
  position:absolute; width:2px; height:2px; background:#fff; border-radius:50%;
}
.warp-star-layer {
  position:absolute; inset:0;
  animation: warpZoom 1.5s linear infinite;
}
.warp-star-layer:nth-child(2) { animation-delay:-0.5s; animation-duration:1.2s; }
.warp-star-layer:nth-child(3) { animation-delay:-1s; animation-duration:0.9s; }

@keyframes warpZoom {
  0% { transform:scale(0.1) rotate(0deg); opacity:0; }
  20% { opacity:1; }
  100% { transform:scale(3) rotate(10deg); opacity:0; }
}

/* Tunnel rings — concentric circles rushing toward viewer */
.warp-tunnel {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
}
.warp-ring {
  position:absolute; border:1px solid rgba(139,92,246,.15); border-radius:50%;
  animation: warpRing 2s linear infinite;
}
.warp-ring:nth-child(1) { animation-delay:0s; }
.warp-ring:nth-child(2) { animation-delay:-0.3s; }
.warp-ring:nth-child(3) { animation-delay:-0.6s; }
.warp-ring:nth-child(4) { animation-delay:-0.9s; }
.warp-ring:nth-child(5) { animation-delay:-1.2s; }
.warp-ring:nth-child(6) { animation-delay:-1.5s; }
.warp-ring:nth-child(7) { animation-delay:-1.8s; }

@keyframes warpRing {
  0% { width:4px; height:4px; opacity:0; border-color:rgba(139,92,246,.6); border-width:2px; }
  30% { opacity:1; }
  100% { width:800px; height:800px; opacity:0; border-color:rgba(139,92,246,.02); border-width:1px; }
}

/* Tesseract grid lines */
.warp-grid {
  position:absolute; inset:0; overflow:hidden; opacity:0.15;
}
.warp-grid-line {
  position:absolute; background:linear-gradient(to bottom, transparent, var(--purple), transparent);
  animation: warpGridLine 3s linear infinite;
}
.warp-grid-line.h { width:100%; height:1px; left:0; }
.warp-grid-line.v { width:1px; height:100%; top:0; }

@keyframes warpGridLine {
  0% { opacity:0; transform:scaleX(0); }
  50% { opacity:1; transform:scaleX(1); }
  100% { opacity:0; transform:scaleX(0); }
}

/* Central light burst */
.warp-core {
  position:relative; z-index:2; text-align:center;
}
.warp-glow {
  width:80px; height:80px; border-radius:50%; margin:0 auto 16px;
  background:radial-gradient(circle, rgba(139,92,246,.8) 0%, rgba(139,92,246,.2) 40%, transparent 70%);
  animation: warpPulse 1.5s ease-in-out infinite;
  box-shadow:0 0 60px rgba(139,92,246,.4), 0 0 120px rgba(139,92,246,.2);
}
@keyframes warpPulse {
  0%,100% { transform:scale(0.8); opacity:0.6; }
  50% { transform:scale(1.2); opacity:1; }
}

.warp-text {
  font-size:14px; font-weight:600; color:var(--fg); letter-spacing:2px; text-transform:uppercase;
  text-shadow:0 0 20px rgba(139,92,246,.5);
  animation:fadeIn .5s ease-out;
}
.warp-sub {
  font-size:11px; color:var(--fg3); margin-top:6px; font-family:monospace;
  animation:fadeIn .5s ease-out .3s both;
}

/* Speed lines radiating from center */
.warp-lines {
  position:absolute; inset:0; overflow:hidden;
}
.warp-line {
  position:absolute; top:50%; left:50%;
  width:2px; height:0;
  background:linear-gradient(to bottom, transparent, rgba(255,255,255,.6), transparent);
  transform-origin:top center;
  animation: warpLine 0.8s linear infinite;
}
@keyframes warpLine {
  0% { height:0; opacity:0; }
  30% { opacity:1; }
  100% { height:300px; opacity:0; }
}

/* Code viewer — VS Code style split pane */
.search-split { display:flex; flex:1; overflow:hidden; }
.search-results-pane { flex:1; overflow-y:auto; min-width:0; }
.code-viewer-pane {
  width:50%; flex-shrink:0; border-left:1px solid var(--border); background:var(--bg);
  display:flex; flex-direction:column; animation:slideInRight .25s ease-out;
}
@keyframes slideInRight { from{opacity:0;transform:translateX(20px);} to{opacity:1;transform:translateX(0);} }
.code-viewer-header {
  display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--border);
  flex-shrink:0; background:var(--bg2); font-size:12px;
}
.code-viewer-tab {
  display:flex; align-items:center; gap:6px; padding:4px 10px; border-radius:6px;
  background:var(--bg3); font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--fg);
}
.code-viewer-body {
  flex:1; overflow-y:auto; font-family:'JetBrains Mono',monospace; font-size:12px; line-height:1.7;
}
.code-viewer-line {
  display:flex; padding:0 12px; min-height:20px;
}
.code-viewer-line:hover { background:rgba(255,255,255,.02); }
.code-viewer-line.highlight { background:rgba(139,92,246,.12); border-left:3px solid var(--purple); }
.code-viewer-num { width:45px; text-align:right; padding-right:14px; color:var(--fg3); flex-shrink:0; user-select:none; }
.code-viewer-text { white-space:pre; overflow-x:auto; color:var(--fg2); }

/* Responsive: collapse sidebar on small screens */
@media (max-width: 768px) {
  .sidebar { width:56px; }
  .sidebar-logo h1,.sidebar-logo span,.sidebar-item span:not(.icon),.sidebar-item .badge,.sidebar-footer .sel:not(:first-child),.sidebar-stats { display:none; }
  .sidebar-item { justify-content:center; padding:12px; }
}
</style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#a1a1aa;font-family:Inter,system-ui,sans-serif"><div style="text-align:center"><div style="font-size:24px;font-weight:800;margin-bottom:8px;color:#fafafa">Milli-Agent</div><div style="font-size:13px">Loading 27 tools...</div></div></div></div>
<script type="module">
const IMPLS = {cpp:{name:'C++',color:'#00a0e4',icon:'⚡'},rust:{name:'Rust',color:'#f74c00',icon:'🦀'},zig:{name:'Zig',color:'#f7a41d',icon:'⚙'},swift:{name:'Swift',color:'#f05138',icon:'🐦'},python:{name:'Python',color:'#ffd43b',icon:'🐍'}};
const fmt = ms => ms<1000?Math.round(ms)+'ms':(ms/1000).toFixed(1)+'s';
const h = (tag, props, ...kids) => { const el=document.createElement(tag); if(props) Object.entries(props).forEach(([k,v])=>{ if(k==='style'&&typeof v==='object') Object.assign(el.style,v); else if(k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v); else if(k==='className') el.className=v; else if(k==='innerHTML') el.innerHTML=v; else el.setAttribute(k,v); }); kids.flat(9).forEach(c=>{ if(c==null||c===false)return; el.appendChild((typeof c==='string'||typeof c==='number')?document.createTextNode(String(c)):c); }); return el; };

let state = { tab:'cockpit', model:'google/gemma-4-26b-a4b-it', impl:'cpp', models:[], activeModels:['google/gemma-4-26b-a4b-it'], ready:0, msgs:[], input:'', sending:false, racePattern:'', racePath:'https://github.com/walter-grace/milli-agent', raceResults:{}, raceWinner:null, racing:false, sessionCost:0, accountCost:0, cacheHits:0, cacheSaved:0, modelHealth:{} };
let currentTab = null;
let chatInput = null; // persistent textarea ref
let raceInput = null; // persistent race input ref

function refreshNav() {
  const app = document.getElementById('app');
  const oldNav = app.querySelector('.sidebar');
  if (oldNav) { const newNav = buildNav(); app.replaceChild(newNav, oldNav); }
}

function render() {
  try {
  const app = document.getElementById('app');

  // Only full rebuild on tab change or first render
  if (!app.firstChild || currentTab !== state.tab) {
    app.innerHTML = '';
    app.appendChild(buildNav());
    const content = h('div',{className:'content'});

    // Model tab bar — disabled, using sidebar checkboxes instead
    if (false && state.activeModels.length > 0 && state.models.length > 0) {
      const modelBar = h('div',{style:{display:'flex',alignItems:'center',gap:'4px',padding:'6px 12px',borderBottom:'1px solid var(--border)',overflowX:'auto',flexShrink:0}});
      state.activeModels.forEach(mid => {
        const m = state.models.find(x => x.id === mid);
        if (!m) return;
        const isCurrent = state.model === mid;

      addBtn.onmouseleave = () => { addBtn.style.borderColor='var(--border)'; addBtn.style.color='var(--fg3)'; addBtn.style.background='transparent'; };
      addBtn.onclick = (e) => {
        e.stopPropagation();

        const old = document.getElementById('model-add-dropdown');
        if (old) { old.remove(); return; }
        // Position dropdown relative to button
        const rect = addBtn.getBoundingClientRect();
        // Build dropdown — append to body to avoid overflow clipping
        const dd = document.createElement('div');
        dd.id = 'model-add-dropdown';
        dd.style.cssText = 'position:fixed;top:'+(rect.bottom+4)+'px;left:'+(rect.right-240)+'px;width:240px;background:#18181b;border:1px solid #3f3f46;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.5);padding:8px;max-height:280px;overflow-y:auto;z-index:9999;';
        // Title
        const title = document.createElement('div');
        title.textContent = 'Add Models';
        title.style.cssText = 'font-size:11px;color:var(--fg3);text-transform:uppercase;letter-spacing:1px;font-weight:600;padding:4px 8px 8px;';
        dd.appendChild(title);
        state.models.forEach(m => {
          const active = state.activeModels.includes(m.id);
          const row = document.createElement('button');
          row.style.cssText = 'display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border-radius:8px;border:none;background:'+(active?'var(--bg3)':'transparent')+';color:'+(active?'var(--fg)':'var(--fg3)')+';cursor:pointer;font-size:12px;text-align:left;transition:all .1s;font-family:inherit;';
          row.onmouseenter = () => { if(!active) row.style.background='var(--bg3)'; };
          row.onmouseleave = () => { if(!active) row.style.background='transparent'; };
          row.onclick = (ev) => {
            ev.stopPropagation();
            if (active && state.activeModels.length > 1) {
              state.activeModels = state.activeModels.filter(id => id !== m.id);
              if (state.model === m.id) state.model = state.activeModels[0];
            } else if (!active) {
              state.activeModels.push(m.id);
              state.model = m.id;
            }
            dd.remove();
            render();
          };
          // Checkbox
          const check = document.createElement('div');
          check.style.cssText = 'width:16px;height:16px;border-radius:4px;border:2px solid '+(active?'var(--purple)':'var(--border)')+';background:'+(active?'var(--purple)':'transparent')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:#fff;';
          if (active) check.textContent = '✓';
          row.appendChild(check);
          // Name
          const name = document.createElement('span');
          name.textContent = m.name;
          name.style.cssText = 'flex:1;';
          row.appendChild(name);
          // Free badge
          if (m.free) {
            const badge = document.createElement('span');
            badge.textContent = 'free';
            badge.style.cssText = 'font-size:9px;color:var(--green);font-weight:700;';
            row.appendChild(badge);
          }
          dd.appendChild(row);
        });
        document.body.appendChild(dd);
        // Close on outside click
        const closeHandler = (ev) => {
          if (!dd.contains(ev.target) && ev.target !== addBtn) { dd.remove(); document.removeEventListener('click', closeHandler); }
        };
        setTimeout(() => document.addEventListener('click', closeHandler), 0);
      };
      addWrap.appendChild(addBtn);
      modelBar.appendChild(addWrap);
      content.appendChild(modelBar);
    }
    if (state.tab==='cockpit') content.appendChild(renderCockpit());
    else if (state.tab==='search') content.appendChild(renderSearch());
    else if (state.tab==='chat') content.appendChild(renderChat());
    else if (state.tab==='api') content.appendChild(renderAPI());
    else if (state.tab==='whitehat') content.appendChild(renderWhiteHat());
    else if (state.tab==='heal') content.appendChild(renderHeal());
    else { state.tab = 'cockpit'; content.appendChild(renderCockpit()); }
    app.appendChild(content);
    currentTab = state.tab;
  } else {
    // Update sidebar active state
    const oldSidebar = app.querySelector('.sidebar');
    if (oldSidebar) { const newSidebar = buildNav(); app.replaceChild(newSidebar, oldSidebar); }
    if (state.tab==='chat') updateChatMessages();
  }
  } catch(e) { console.error('Render error:', e); document.getElementById('app').innerHTML = '<div style="padding:40px;color:#fff">Render error: '+e.message+'</div>'; }
}

// Syntax highlighting — VS Code Dark+ inspired colors
function syntaxHighlight(line, lang) {
  // Escape HTML first
  let s = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Comments (must go first — greedy)
  s = s.replace(/(\/\/.*$)/gm, '<span style="color:#6A9955">$1</span>');
  s = s.replace(/(#[^{].*$)/gm, '<span style="color:#6A9955">$1</span>');

  // Strings (double, single, backtick)
  s = s.replace(/("(?:[^"\\]|\\.)*")/g, '<span style="color:#CE9178">$1</span>');
  s = s.replace(/('(?:[^'\\]|\\.)*')/g, '<span style="color:#CE9178">$1</span>');
  s = s.replace(/(`(?:[^`\\]|\\.)*`)/g, '<span style="color:#CE9178">$1</span>');

  // Numbers
  s = s.replace(/\b(\d+\.?\d*)\b/g, '<span style="color:#B5CEA8">$1</span>');

  // Keywords (JS/TS/Go/Rust/Python/C)
  const kw = 'function|const|let|var|if|else|for|while|return|import|export|from|class|extends|new|this|async|await|try|catch|throw|switch|case|break|continue|default|typeof|instanceof|in|of|void|null|undefined|true|false|def|self|elif|pass|raise|with|as|yield|lambda|fn|pub|use|mod|impl|struct|enum|trait|match|loop|mut|ref|where|type|interface|package|func|defer|go|chan|select|range|map|nil|fmt|int|string|bool|float|double|char|long|unsigned|static|extern|inline|include|define|ifdef|endif|pragma|template|typename|namespace|virtual|override|final|abstract|synchronized|volatile|transient|native|strictfp|throws|implements';
  s = s.replace(new RegExp('\\b(' + kw + ')\\b', 'g'), '<span style="color:#569CD6">$1</span>');

  // Built-in types / special
  const types = 'String|Number|Boolean|Array|Object|Map|Set|Promise|Error|Date|RegExp|console|document|window|process|require|module|exports|Math|JSON|Buffer|Response|Request|fetch|setTimeout|setInterval|println|printf|print|len|append|make|panic|recover|Vec|Box|Option|Result|Some|None|Ok|Err|Self|super';
  s = s.replace(new RegExp('\\b(' + types + ')\\b', 'g'), '<span style="color:#4EC9B0">$1</span>');

  // Function calls (word followed by parenthesis)
  s = s.replace(/\b([a-zA-Z_]\w*)\s*\(/g, '<span style="color:#DCDCAA">$1</span>(');

  // Decorators / attributes
  s = s.replace(/(@\w+)/g, '<span style="color:#DCDCAA">$1</span>');

  // Operators
  s = s.replace(/(===|!==|==|!=|&lt;=|&gt;=|=&gt;|&amp;&amp;|\|\||\.\.\.)/g, '<span style="color:#D4D4D4">$1</span>');

  return s;
}

// Code viewer — VS Code style split pane (inline, not overlay)
let codeViewerOpen = false;

async function openCodeViewer(filePath, lineNum) {
  try {
    const resp = await fetch('/api/file/read', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ path: filePath, start_line: 1, end_line: 1000 })
    });
    const data = await resp.json();
    const rawContent = data.content || data.text || '';
    // Strip the header line from read_file output (e.g., "File: ... Showing lines...")
    const contentLines = rawContent.split('\n');
    const startIdx = contentLines.findIndex(l => l.match(/^\d+\|/));
    const codeLines = startIdx >= 0 ? contentLines.slice(startIdx).map(l => l.replace(/^\d+\|/, '')) : contentLines;

    renderCodePane(filePath, codeLines.join('\n'), parseInt(lineNum) || 0);
  } catch (e) {
    showToast('Could not read file: ' + e.message, 'error');
  }
}

function renderCodePane(filePath, content, highlightLine) {
  const existing = document.getElementById('code-viewer-pane');
  if (existing) existing.remove();

  // Ensure search results area is in split layout
  const searchResults = document.getElementById('search-results');
  if (!searchResults) return;
  const parent = searchResults.parentElement;
  if (!parent.classList.contains('search-split')) {
    // Wrap in split layout
    const split = h('div',{className:'search-split'});
    searchResults.classList.add('search-results-pane');
    parent.insertBefore(split, searchResults);
    split.appendChild(searchResults);
  }

  const splitContainer = parent.querySelector('.search-split') || searchResults.parentElement;

  // Build code pane
  const pane = h('div',{className:'code-viewer-pane',id:'code-viewer-pane'});

  // Header with tab
  const header = h('div',{className:'code-viewer-header'});
  const fileName = filePath.split('/').pop();
  header.appendChild(h('div',{className:'code-viewer-tab'},
    h('span',null,fileName),
    highlightLine ? h('span',{style:{color:'var(--purple)'}},'L'+highlightLine) : null,
  ));
  header.appendChild(h('span',{style:{flex:1}}));
  const closeBtn = h('button',{style:{width:'24px',height:'24px',borderRadius:'6px',border:'none',background:'transparent',color:'var(--fg3)',cursor:'pointer',fontSize:'12px',display:'flex',alignItems:'center',justifyContent:'center',transition:'color .1s'},
    onClick:()=>{ pane.remove(); codeViewerOpen = false; const sr = document.getElementById('search-results'); if(sr) sr.style.flex='1'; }});
  closeBtn.textContent = '✕';
  closeBtn.addEventListener('mouseenter',()=>closeBtn.style.color='var(--red)');
  closeBtn.addEventListener('mouseleave',()=>closeBtn.style.color='var(--fg3)');
  header.appendChild(closeBtn);
  pane.appendChild(header);

  // Detect language for syntax highlighting
  const ext = filePath.split('.').pop().toLowerCase();

  // Code body with syntax highlighting
  const body = h('div',{className:'code-viewer-body'});
  const lines = content.split('\n');
  lines.forEach((text, i) => {
    const lineNo = i + 1;
    const isHighlight = lineNo === highlightLine;
    const row = h('div',{className:'code-viewer-line'+(isHighlight?' highlight':'')});
    row.appendChild(h('span',{className:'code-viewer-num'},String(lineNo)));
    const codeSpan = h('span',{className:'code-viewer-text'});
    codeSpan.innerHTML = syntaxHighlight(text, ext);
    row.appendChild(codeSpan);
    body.appendChild(row);
  });
  pane.appendChild(body);

  splitContainer.appendChild(pane);
  codeViewerOpen = true;

  // Scroll to highlighted line
  if (highlightLine > 0) {
    setTimeout(() => {
      const hl = body.querySelector('.highlight');
      if (hl) hl.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }, 100);
  }
}

// Verification badge — show trust label after each response
function chatShowVerification(report) {
  if (!liveChatEl) return;
  const colors = {
    GROUNDED: 'var(--green)',
    LIKELY_GROUNDED: 'var(--green)',
    LOW_CONFIDENCE: 'var(--yellow)',
    PARTIALLY_GROUNDED: 'var(--yellow)',
    PARTIALLY_HALLUCINATED: '#f97316',
    MOSTLY_HALLUCINATED: 'var(--red)',
    PURE_FABRICATION: 'var(--red)',
    UNGROUNDED: 'var(--red)',
    UNKNOWN: 'var(--fg3)',
    VERIFY_ERROR: 'var(--fg3)',
  };
  const color = colors[report.label] || 'var(--fg3)';
  const icon = report.score >= 0.8 ? '✓' : report.score >= 0.5 ? '?' : '!';

  const badge = h('div',{style:{
    display:'flex',alignItems:'center',gap:'8px',padding:'8px 12px',marginTop:'6px',
    borderRadius:'8px',border:'1px solid '+color,
    background:color+'10',fontSize:'11px',fontFamily:'monospace',color:color,maxWidth:'85%',
    cursor:'pointer'
  }, onClick:()=>{
    // Toggle detail view
    const next = badge.nextSibling;
    if (next && next.classList && next.classList.contains('verify-detail')) { next.remove(); return; }
    const detail = h('div',{className:'verify-detail',style:{
      padding:'10px 14px',marginTop:'4px',borderRadius:'8px',background:'var(--bg2)',
      border:'1px solid var(--border)',fontSize:'10px',fontFamily:'monospace',color:'var(--fg3)',
      maxWidth:'85%',whiteSpace:'pre-wrap',lineHeight:'1.6'
    }});
    let lines = [];
    lines.push('Citations: ' + report.citations.verified + '/' + report.citations.total + ' verified');
    if (report.citations.fabricated > 0) lines.push('Fabricated: ' + report.citations.fabricated);
    if (report.citations.unverifiable > 0) lines.push('Unverifiable: ' + report.citations.unverifiable);
    lines.push('Coverage: ' + (report.coverage.score*100).toFixed(0) + '% (' + report.coverage.matched_grams + '/' + report.coverage.total_grams + ' n-grams)');
    lines.push('Tool calls: ' + report.ledger_size);
    if (report.judge && !report.judge.skipped) {
      lines.push('Judge (Claude): ' + report.judge.verdict + ' (' + (report.judge.confidence*100).toFixed(0) + '%)');
      if (report.judge.summary) lines.push('  → ' + report.judge.summary);
      if (report.judge.fabrication_count > 0) lines.push('  Fabricated claims: ' + report.judge.fabrication_count);
    }
    detail.textContent = lines.join('\n');
    badge.parentNode.insertBefore(detail, badge.nextSibling);
  }},
    h('span',{style:{fontWeight:700}},icon),
    h('span',null,report.label),
    h('span',{style:{marginLeft:'auto',opacity:.7}},'trust ' + (report.score*100).toFixed(0) + '%'),
  );
  liveChatEl.appendChild(badge);
}

// Toast notifications
function showToast(msg, type = '') {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = h('div',{className:'toast '+ type},msg);
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

// CMD+K global search
let cmdkOpen = false;
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    toggleCmdK();
  }
  if (e.key === 'Escape' && cmdkOpen) closeCmdK();
  // / to focus search
  if (e.key === '/' && !e.target.closest('input,textarea,select')) {
    e.preventDefault();
    if (state.tab !== 'search') { state.tab = 'search'; render(); }
    setTimeout(() => { if (searchInput) searchInput.focus(); }, 100);
  }
});

function toggleCmdK() {
  if (cmdkOpen) { closeCmdK(); return; }
  cmdkOpen = true;
  const overlay = h('div',{className:'cmdk-overlay',onClick:closeCmdK});
  const modal = h('div',{className:'cmdk'});
  const input = document.createElement('input');
  input.placeholder = 'Search tools, actions, repos...';
  input.addEventListener('input', e => updateCmdKResults(e.target.value, modal));
  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeCmdK();
    if (e.key === 'Enter') { const active = modal.querySelector('.cmdk-item.active'); if (active) active.click(); }
  });
  modal.appendChild(input);
  const results = h('div',{className:'cmdk-results'});
  // Default items
  NAV_ITEMS.forEach(item => {
    const row = h('div',{className:'cmdk-item',onClick:()=>{ closeCmdK(); state.tab=item.id; render(); }},
      h('span',null,item.icon), h('span',null,item.label + ' — ' + item.desc));
    results.appendChild(row);
  });
  modal.appendChild(results);
  document.body.appendChild(overlay);
  document.body.appendChild(modal);
  setTimeout(() => input.focus(), 50);
}

function closeCmdK() {
  cmdkOpen = false;
  document.querySelectorAll('.cmdk-overlay,.cmdk').forEach(el => el.remove());
}

function updateCmdKResults(query, modal) {
  const results = modal.querySelector('.cmdk-results');
  if (!results) return;
  results.innerHTML = '';
  const q = query.toLowerCase();
  const allItems = [
    ...NAV_ITEMS.map(i => ({ ...i, action: () => { state.tab = i.id; render(); } })),
    { icon:'🔧', label:'grep_search', desc:'Regex search files', action:()=>{ state.tab='search'; render(); } },
    { icon:'📦', label:'clone_repo', desc:'Clone a GitHub repo', action:()=>{ state.tab='chat'; render(); } },
    { icon:'🛡', label:'Run Security Audit', desc:'Full OWASP + CVE scan', action:()=>{ state.tab='whitehat'; render(); } },
    { icon:'📊', label:'OpenAPI Search', desc:'Upload and search specs', action:()=>{ state.tab='api'; render(); } },
  ];
  const filtered = q ? allItems.filter(i => (i.label+i.desc).toLowerCase().includes(q)) : allItems;
  filtered.slice(0, 8).forEach((item, idx) => {
    const row = h('div',{className:'cmdk-item'+(idx===0?' active':''),onClick:()=>{ closeCmdK(); item.action(); }},
      h('span',null,item.icon), h('span',null,item.label + ' — ' + item.desc));
    results.appendChild(row);
  });
}

  stats.appendChild(h('span',{className:'sidebar-stat',style:{background:state.ready>=serverCount-1?'rgba(34,197,94,.1)':'rgba(234,179,8,.1)',color:state.ready>=serverCount-1?'var(--green)':'var(--yellow)'}},state.ready+'/'+serverCount));
  if (state.sessionCost > 0) stats.appendChild(h('span',{className:'sidebar-stat',style:{background:'rgba(34,197,94,.1)',color:'var(--green)'}},'$'+state.sessionCost.toFixed(4)));
  if (state.cacheHits > 0) stats.appendChild(h('span',{className:'sidebar-stat',style:{background:'rgba(139,92,246,.1)',color:'var(--purple)'}},state.cacheHits+' hits'));

  sidebar.appendChild(footer);

  return sidebar;
}

function renderSelect(cls,val,opts,onChange) {
  const sel = h('select',{className:cls});
  opts.forEach(o => { const opt=h('option',{value:o.value},o.label); if(o.value===val)opt.selected=true; sel.appendChild(opt); });

  return sel;
}

function renderToolCard(tc) {
  // For MCP-backed tools (grep_search), use the actual MCP impl from the result.
  // For system tools (read_file, code_stats, etc), use the user's selected server.
  const isMcp = ['grep_search', 'read_file', 'list_files', 'code_stats'].includes(tc.name);

  const head = h('div',{className:'tc-head'},
    loading ? h('span',{className:'spinner'}) : h('span',null,'▶'),

  );
  if(tc.result) head.appendChild(h('span',{style:{marginLeft:'auto',fontFamily:'monospace',fontWeight:700,color:'var(--green)',fontSize:'12px'}},fmt(tc.result.elapsed)));
  card.appendChild(head);

  if(tc.args) {

    Object.entries(tc.args).forEach(([k,v])=>{ args.appendChild(h('span',{style:{marginRight:'12px'}}, h('span',{style:{color:'var(--purple)'}},k), '='+JSON.stringify(v).slice(0,80))); });

  }
  if(tc.result?.preview) {

    tc.result.preview.forEach(line => {

      lines.appendChild(h('div',{className:'tc-line'}, h('span',{className:'tc-f'},p[0]?.split('/').pop()||''), h('span',{className:'tc-n'},p[1]||''), h('span',{className:'tc-c'},p.slice(2).join(':'))));

      h('span',null,h('b',null,'~'+Math.ceil(tc.result.bytes/4)),' tokens'),
    ));
  }
  return card;
}

// Markdown → HTML — handles headings, bold, italic, code, lists, links, blockquote, hr, tables
function mdToHtml(text) {
  if (!text) return '';
  // Escape HTML first
  let s = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Convert common LaTeX symbols to unicode
  s = s.replace(/\$\\rightarrow\$/g, '→');
  s = s.replace(/\$\\leftarrow\$/g, '←');
  s = s.replace(/\$\\Rightarrow\$/g, '⇒');
  s = s.replace(/\$\\Leftarrow\$/g, '⇐');
  s = s.replace(/\$\\to\$/g, '→');
  s = s.replace(/\$\\times\$/g, '×');
  s = s.replace(/\$\\alpha\$/g, 'α');
  s = s.replace(/\$\\beta\$/g, 'β');
  s = s.replace(/\$\\sim\$/g, '~');

  // Code fences ```lang\n...\n``` — emit with data-lang so we can attach ▶ Run / 📦 Deploy
  s = s.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) => {
    const clean = code.replace(/\n$/,'');
    const dataLang = (lang || '').toLowerCase();
    return '<pre data-lang="' + dataLang + '"><code>' + clean + '</code></pre>';
  });

  // Inline code `...`
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');

  // Headings
  s = s.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Horizontal rule
  s = s.replace(/^---+$/gm, '<hr>');

  // Bold **...** and __...__ — NO newlines allowed in match
  s = s.replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/__([^_\n]+?)__/g, '<strong>$1</strong>');

  // Italic *...* (avoid matching bold) and _..._
  s = s.replace(/(?<!\*)\*([^*\n]+?)\*(?!\*)/g, '<em>$1</em>');
  s = s.replace(/(?<!_)_([^_\n]+?)_(?!_)/g, '<em>$1</em>');

  // Links [text](url)
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Blockquotes
  s = s.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // Lists — group consecutive list items
  // Unordered
  s = s.replace(/(^[ \t]*[*\-+] .+(?:\n[ \t]*[*\-+] .+)*)/gm, (match) => {
    const items = match.split('\n').map(l => l.replace(/^[ \t]*[*\-+] /, '').trim()).filter(Boolean);
    return '<ul>' + items.map(i => '<li>' + i + '</li>').join('') + '</ul>';
  });
  // Ordered
  s = s.replace(/(^[ \t]*\d+\. .+(?:\n[ \t]*\d+\. .+)*)/gm, (match) => {
    const items = match.split('\n').map(l => l.replace(/^[ \t]*\d+\. /, '').trim()).filter(Boolean);
    return '<ol>' + items.map(i => '<li>' + i + '</li>').join('') + '</ol>';
  });

  // Tables (simple github style)
  s = s.replace(/((?:^\|.+\|$\n?)+)/gm, (match) => {
    const rows = match.trim().split('\n').filter(l => l.startsWith('|'));
    if (rows.length < 2) return match;
    const isAlign = (r) => /^\|(\s*:?-+:?\s*\|)+$/.test(r);
    const headerCells = rows[0].split('|').slice(1, -1).map(c => c.trim());
    const dataRows = rows.slice(isAlign(rows[1]) ? 2 : 1);
    let html = '<table><thead><tr>';
    headerCells.forEach(c => html += '<th>' + c + '</th>');
    html += '</tr></thead><tbody>';
    dataRows.forEach(r => {
      const cells = r.split('|').slice(1, -1).map(c => c.trim());
      html += '<tr>' + cells.map(c => '<td>' + c + '</td>').join('') + '</tr>';
    });
    html += '</tbody></table>';
    return html;
  });

  // Paragraphs — wrap consecutive non-html lines
  // Split on double newlines, wrap text blocks
  const blocks = s.split(/\n\n+/);
  s = blocks.map(block => {
    const trimmed = block.trim();
    if (!trimmed) return '';
    // Skip if already starts with HTML tag
    if (/^<(h[1-6]|ul|ol|pre|blockquote|hr|table|p)/.test(trimmed)) return trimmed;
    // Convert single newlines to <br>
    return '<p>' + trimmed.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');

  return s;
}

function chatAppendText(text) {
  if (!liveChatEl) return;
  if (!liveBubbleEl) {
    liveBubbleEl = h('div',{className:'bubble'});
    if (liveStatusEl && liveStatusEl.parentNode === liveChatEl) {
      liveChatEl.insertBefore(liveBubbleEl, liveStatusEl);
    } else {
      liveChatEl.appendChild(liveBubbleEl);
    }
  }
  // Throttle text updates to avoid layout thrashing
  chatPendingText = text;
  if (chatTextTimer) return;
  chatTextTimer = setTimeout(() => {
    chatTextTimer = null;
    if (chatPendingText !== null) {
      liveBubbleEl.innerHTML = mdToHtml(chatPendingText);
      attachCodeButtons(liveBubbleEl);
      chatPendingText = null;
      const msgArea = document.getElementById('chat-messages');
      if (msgArea) msgArea.scrollTop = msgArea.scrollHeight;
    }
  }, 80);
}

    bar.appendChild(h('span',{style:{fontSize:'10px',fontFamily:'monospace',color:'var(--fg3)',textTransform:'uppercase',letterSpacing:'.5px',fontWeight:700}},lang));
    bar.appendChild(h('div',{style:{flex:1}}));

    const runBtn = h('button',{
      style:{padding:'3px 10px',borderRadius:'6px',border:'1px solid rgba(34,197,94,.35)',background:'rgba(34,197,94,.10)',color:'var(--green)',fontSize:'10px',fontWeight:700,cursor:'pointer'},

      onClick: (e) => { e.stopPropagation(); runCodeBlock(pre, lang); },
    },'▶ Run');
    bar.appendChild(runBtn);

function showOutputPanel(pre, kind, text) {
  let panel = pre.nextElementSibling;
  if (!panel || !panel.classList?.contains('sbx-out')) {
    panel = h('div',{className:'sbx-out',style:{margin:'-4px 0 10px 0',padding:'10px 12px',borderRadius:'0 0 10px 10px',background:'var(--bg2)',border:'1px solid var(--border)',borderTop:'none',fontFamily:'JetBrains Mono, monospace',fontSize:'11px',lineHeight:'1.5',whiteSpace:'pre-wrap',color:'var(--fg2)',maxHeight:'280px',overflowY:'auto'}});
    pre.insertAdjacentElement('afterend', panel);
  }
  if (kind === 'reset') { panel.innerHTML = ''; return panel; }
  const color = kind === 'err' ? '#ef4444' : kind === 'ok' ? 'var(--green)' : kind === 'meta' ? 'var(--fg3)' : 'var(--fg2)';
  const span = document.createElement('span');
  span.style.color = color;
  span.textContent = text;
  panel.appendChild(span);
  panel.scrollTop = panel.scrollHeight;
  return panel;
}

async function runCodeBlock(pre, lang) {
  const codeEl = pre.querySelector('code');
  const code = codeEl ? codeEl.textContent : pre.textContent;
  const panel = showOutputPanel(pre, 'reset');
  showOutputPanel(pre, 'meta', '▶ running in sandbox-exec...\n');
  try {
    const resp = await fetch('/api/sandbox/run', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ code, language: lang, timeout: 10000 }),
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let leftover = '';
    while (true) {
      const { done, value } = await reader.read();
      if (value) leftover += decoder.decode(value, { stream: true });
      if (done) leftover += decoder.decode();
      let idx;
      while ((idx = leftover.indexOf('\n\n')) !== -1) {
        const block = leftover.slice(0, idx);
        leftover = leftover.slice(idx + 2);
        let evt = null, data = null;
        for (const line of block.split('\n')) {
          if (line.startsWith('event: ')) evt = line.slice(7).trim();
          else if (line.startsWith('data: ')) data = line.slice(6);
        }
        if (!evt || !data) continue;
        let d; try { d = JSON.parse(data); } catch { continue; }
        if (evt === 'stdout') showOutputPanel(pre, 'out', d.chunk);
        else if (evt === 'stderr') showOutputPanel(pre, 'err', d.chunk);
        else if (evt === 'exit') {
          const mark = d.timedOut ? '⏱ timeout' : (d.exitCode === 0 ? '✓ exit 0' : '✗ exit '+d.exitCode);
          showOutputPanel(pre, d.exitCode === 0 ? 'ok' : 'err', '\n— '+mark+'  ·  '+d.elapsedMs+' ms\n');
        }
        else if (evt === 'error') showOutputPanel(pre, 'err', '\nserver error: '+d.message+'\n');
      }
      if (done) break;
    }
  } catch (e) {
    showOutputPanel(pre, 'err', '\nfetch failed: '+e.message);
  }
}

async function selfHealCodeBlock(pre, lang) {
  const codeEl = pre.querySelector('code');
  const code = codeEl ? codeEl.textContent : pre.textContent;
  showOutputPanel(pre, 'reset');
  showOutputPanel(pre, 'meta', '🔁 self-heal loop starting...\n');
  try {
    const resp = await fetch('/api/sandbox/self-heal', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ code, language: lang, max_attempts: 5 }),
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let leftover = '';
    while (true) {
      const { done, value } = await reader.read();
      if (value) leftover += decoder.decode(value, { stream: true });
      if (done) leftover += decoder.decode();
      let idx;
      while ((idx = leftover.indexOf('\n\n')) !== -1) {
        const block = leftover.slice(0, idx);
        leftover = leftover.slice(idx + 2);
        let evt = null, data = null;
        for (const line of block.split('\n')) {
          if (line.startsWith('event: ')) evt = line.slice(7).trim();
          else if (line.startsWith('data: ')) data = line.slice(6);
        }
        if (!evt || !data) continue;
        let d; try { d = JSON.parse(data); } catch { continue; }
        if (evt === 'iteration') {
          showOutputPanel(pre, 'meta', `\n[#${d.n}] ${d.phase}: ${d.detail || (d.codePreview || '').slice(0, 60)}\n`);
        } else if (evt === 'stdout') {
          showOutputPanel(pre, 'out', d.chunk);
        } else if (evt === 'stderr') {
          showOutputPanel(pre, 'err', d.chunk);
        } else if (evt === 'exit') {
          const mark = d.timedOut ? '⏱ timeout' : (d.code === 0 ? '✓ exit 0' : '✗ exit ' + d.code);
          showOutputPanel(pre, d.code === 0 ? 'ok' : 'err', `\n— iter#${d.n} ${mark} (${d.elapsed}ms)\n`);
        } else if (evt === 'patch') {
          showOutputPanel(pre, 'meta', `\n📝 patch (${d.diff_summary})\n`);
          // Update the code block in place so the user sees the new version
          if (codeEl) codeEl.textContent = d.newCode;
        } else if (evt === 'done') {
          const status = d.status === 'passed' ? 'ok' : 'err';
          showOutputPanel(pre, status, `\n=== ${d.status.toUpperCase()} after ${d.attempts} attempts (${d.elapsedMs}ms) ===\n`);
          if (d.finalStdout) showOutputPanel(pre, 'out', d.finalStdout);
          if (d.reason) showOutputPanel(pre, 'err', '\n' + d.reason);
        }
      }
      if (done) break;
    }
  } catch (e) {
    showOutputPanel(pre, 'err', '\nfetch failed: ' + e.message);
  }
}

async function deployCodeBlock(pre, lang, opts = {}) {
  const codeEl = pre.querySelector('code');
  const code = codeEl ? codeEl.textContent : pre.textContent;
  // Persistent name: pre.dataset.deployName survives re-deploys → same workers.dev URL
  const previousName = pre.dataset.deployName || '';
  let name = previousName;
  // First deploy → prompt. Subsequent deploys reuse silently. Shift+Click forces a rename.
  if (!name || opts.rename) {
    name = window.prompt('Worker name (lowercase, dashes ok). Leave blank for random.', previousName || '') || '';
    name = name.trim().toLowerCase().replace(/[^a-z0-9-]/g, '-');
  }
  showOutputPanel(pre, 'reset');
  showOutputPanel(pre, 'meta', `📦 uploading to Cloudflare Workers${name ? ' as "'+name+'"' : ''}...\n`);
  try {
    const resp = await fetch('/api/sandbox/deploy', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ code, language: lang, name: name || undefined }),
    });
    const j = await resp.json();
    if (!resp.ok) {
      showOutputPanel(pre, 'err', 'deploy failed: '+(j.error||'unknown')+(j.hint?'\nhint: '+j.hint:''));
      return;
    }
    // Pin the name on the code block so subsequent deploys re-use it
    pre.dataset.deployName = j.name;
    // Update the deploy button label to indicate the pinned name
    const deployBtn = Array.from(pre.querySelectorAll('button')).find(b => b.textContent.includes('Deploy'));
    if (deployBtn) {
      deployBtn.textContent = '📌 ' + j.name;
      deployBtn.title = 'Re-deploy as "' + j.name + '" (Shift+Click to rename)';
    }
    showOutputPanel(pre, 'ok', '✓ deployed as "'+j.name+'" ('+j.elapsedMs+' ms)\n');
    if (j.url) {
      const panel = showOutputPanel(pre, 'meta', '');
      const link = h('a',{href:j.url,target:'_blank',rel:'noopener',style:{color:'var(--purple)',textDecoration:'underline',fontWeight:700}},j.url);
      panel.appendChild(link);
      panel.appendChild(document.createTextNode('\n'));
    }
  } catch (e) {
    showOutputPanel(pre, 'err', 'fetch failed: '+e.message);
  }
}

    liveStatsEl = h('div',{className:'stats anim'},
      h('span',null,fmt(stats.totalMs)+' total'), h('span',null,stats.toolCalls+' calls'),

      costStr ? h('span',{style:{color:'var(--green)',fontWeight:600}},costStr) : null,
    );

// ─── @-mention context attachment ─────────────────────────────────────
const MENTION_SOURCES = [
  { id:'cockpit',  icon:'🛩', label:'cockpit',  desc:'Mission Control run' },
  { id:'whitehat', icon:'🛡', label:'whitehat', desc:'Security audit' },

let availableContext = {}; // { cockpit:{available,age,summary}, ... }
let mentionSelectedIdx = 0;
let mentionFiltered = [];

async function refreshContextStrip() {

function insertMentionAtCursor(sourceId) {
  if (!chatInput) return;
  const tag = '@' + sourceId + ' ';
  const pos = chatInput.selectionStart;
  const before = chatInput.value.slice(0, pos);
  const after = chatInput.value.slice(pos);
  chatInput.value = before + tag + after;
  chatInput.selectionStart = chatInput.selectionEnd = pos + tag.length;
  state.input = chatInput.value;
  chatInput.focus();
  closeMentionDropdown();
  updateSendBtn();
}

function handleMentionAutocomplete(textarea) {
  const pos = textarea.selectionStart;
  const before = textarea.value.slice(0, pos);
  const m = before.match(/@(\w*)$/);
  if (!m) { closeMentionDropdown(); return; }
  const q = m[1].toLowerCase();
  mentionFiltered = MENTION_SOURCES.filter(s => s.id.startsWith(q));
  if (mentionFiltered.length === 0) { closeMentionDropdown(); return; }
  mentionSelectedIdx = 0;
  showMentionDropdown(textarea);
}

function showMentionDropdown(textarea) {
  closeMentionDropdown();
  const dd = h('div',{id:'mention-dropdown',style:{
    position:'absolute',
    background:'var(--bg2)',
    border:'1px solid var(--border)',
    borderRadius:'10px',
    padding:'4px',
    minWidth:'280px',
    boxShadow:'0 8px 24px rgba(0,0,0,.5)',
    zIndex:9999,
    fontSize:'12px',
  }});
  mentionFiltered.forEach((src, i) => {
    const ctx = availableContext[src.id] || {};
    const ok = !!ctx.available;
    const item = h('div',{
      style:{
        display:'flex',alignItems:'center',gap:'8px',
        padding:'8px 10px',borderRadius:'6px',cursor:'pointer',
        background: i === mentionSelectedIdx ? 'rgba(139,92,246,.15)' : 'transparent',
        color: ok ? 'var(--fg)' : 'var(--fg3)',
        opacity: ok ? 1 : 0.55,
      },
      onMousedown:(e)=>{ e.preventDefault(); insertMentionAtCursor(src.id); },
    },
      h('span',{style:{fontSize:'14px'}},src.icon),
      h('div',{style:{flex:1}},
        h('div',{style:{fontWeight:600}},'@'+src.label, ok ? ' ✓' : ' (no run yet)'),
        h('div',{style:{fontSize:'10px',color:'var(--fg3)'}}, ok ? (ctx.summary || src.desc) : src.desc),
      ),
      ok && ctx.age ? h('span',{style:{fontSize:'10px',color:'var(--fg3)',fontFamily:'monospace'}},ctx.age) : null,
    );
    dd.appendChild(item);
  });
  // Position above the textarea
  const rect = textarea.getBoundingClientRect();
  dd.style.left = rect.left + 'px';
  dd.style.top = (rect.top - 8) + 'px';
  dd.style.transform = 'translateY(-100%)';
  document.body.appendChild(dd);
}

function closeMentionDropdown() {
  const dd = document.getElementById('mention-dropdown');
  if (dd) dd.remove();
}

function handleMentionKey(key) {
  if (key === 'Escape') { closeMentionDropdown(); return; }
  if (key === 'ArrowDown') { mentionSelectedIdx = (mentionSelectedIdx + 1) % mentionFiltered.length; }
  else if (key === 'ArrowUp') { mentionSelectedIdx = (mentionSelectedIdx - 1 + mentionFiltered.length) % mentionFiltered.length; }
  else if (key === 'Enter' || key === 'Tab') {
    const sel = mentionFiltered[mentionSelectedIdx];
    if (sel) {
      // Replace the partial @xxx token at cursor with the full @id
      const pos = chatInput.selectionStart;
      const before = chatInput.value.slice(0, pos);
      const after = chatInput.value.slice(pos);
      const newBefore = before.replace(/@\w*$/, '@' + sel.id + ' ');
      chatInput.value = newBefore + after;
      chatInput.selectionStart = chatInput.selectionEnd = newBefore.length;
      state.input = chatInput.value;
      closeMentionDropdown();
      updateSendBtn();
      return;
    }
  }
  // Re-render dropdown with new selected idx
  showMentionDropdown(chatInput);
}

      onClick:()=>{

async function sendChat() {
  // Sync from textarea in case state.input is stale
  if (chatInput) state.input = chatInput.value;
  if (!state.input.trim() || state.sending) return;

  const content = state.input.trim();
  state.input = '';
  if (chatInput) chatInput.value = '';
  state.sending = true;
  updateSendBtn();

  // Directly manipulate DOM — no full rebuild
  chatAddUserMsg(content);

  // Multi-model lane mode: when >1 model selected, fan out and render side-by-side lanes
  const models = (state.activeModels && state.activeModels.length > 0) ? state.activeModels : [state.model];
  if (models.length > 1) {
    await sendChatMulti(content, models);
    state.sending = false;
    updateSendBtn();
    return;
  }

  chatStartAssistant();

  state.msgs.push({role:'user', content});
  state.msgs.push({role:'assistant', content:'', toolCalls:[], status:'thinking', stats:null});
  const last = () => state.msgs[state.msgs.length - 1];
  let tcs = [], text = '';

  try {
    const history = state.msgs.filter(m => m.role==='user' || (m.role==='assistant' && m.content)).slice(0,-1).map(m => ({role:m.role, content:m.content}));

    const response = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: content, model: state.model, impl: state.impl, history }),
    });
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (!done) buffer += decoder.decode(value, { stream: true });
      else buffer += decoder.decode();

      const lines = buffer.split('\n');
      buffer = done ? '' : lines.pop();

      let eventType = null;
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ') && eventType) {
          try {
            const d = JSON.parse(line.slice(6));
            if (eventType === 'status') { last().status = d.type; chatUpdateStatus(d.type); }
            else if (eventType === 'tool_call') { tcs.push({name:d.name,args:d.args,impl:d.impl,result:null}); last().toolCalls=[...tcs]; chatAddToolCall(d); chatUpdateStatus('searching'); }
            else if (eventType === 'tool_result') { for(let i=tcs.length-1;i>=0;i--){if(!tcs[i].result){tcs[i].result={elapsed:d.elapsed,bytes:d.bytes,matchCount:d.matchCount,preview:d.preview};break;}} last().toolCalls=[...tcs]; chatUpdateToolResult(d); chatUpdateStatus('thinking'); }
            else if (eventType === 'text_delta') { text+=d.content; last().content=text; chatUpdateStatus(null); chatAppendText(text); }
            else if (eventType === 'text_done') { last().content=d.content; last().stats=d.stats; if(d.stats?.sessionCost) state.sessionCost=d.stats.sessionCost; chatUpdateStatus(null); chatAppendText(d.content); chatFinish(d.stats); refreshNav(); }
            else if (eventType === 'mentions') { last().mentions=d; chatShowMentions(d); }
            else if (eventType === 'verification') { last().verification=d; chatShowVerification(d); }
            else if (eventType === 'error') { last().content='Error: '+(d.message||'Unknown'); chatUpdateStatus(null); chatAppendText('Error: '+(d.message||'Unknown')); chatFinish(null); }
          } catch(parseErr) { /* skip */ }
          eventType = null;
        }
      }
      if (done) break;
    }
  } catch (err) {
    last().content = last().content || 'Error: ' + err.message;
    chatAppendText(last().content);
    chatFinish(null);
  }

  state.sending = false;
  updateSendBtn();
}

// Multi-model fan-out: same prompt to N models in parallel, N lanes side-by-side.
async function sendChatMulti(content, models) {
  const msgArea = document.getElementById('chat-messages');
  if (!msgArea) return;
  let inner = msgArea.querySelector('.messages-inner');
  if (!inner) { inner = h('div',{className:'messages-inner'}); msgArea.appendChild(inner); }
  const empty = inner.querySelector('.empty');
  if (empty) empty.remove();

  // Build the grid container
  const cols = models.length <= 2 ? 'repeat('+models.length+',1fr)' : 'repeat(2,1fr)';
  const grid = h('div',{className:'anim',style:{display:'grid',gridTemplateColumns:cols,gap:'12px',marginTop:'6px'}});
  inner.appendChild(grid);
  msgArea.scrollTop = msgArea.scrollHeight;

  // Build one lane per model, capture local refs
  const lanes = {};
  models.forEach(mid => {
    const m = state.models.find(x => x.id === mid) || { id: mid, name: mid.split('/').pop() };
    const lane = h('div',{style:{borderRadius:'12px',border:'1px solid var(--border)',background:'var(--bg2)',overflow:'hidden',display:'flex',flexDirection:'column',minHeight:'120px'}});
    const header = h('div',{style:{padding:'8px 12px',borderBottom:'1px solid var(--bg3)',display:'flex',alignItems:'center',gap:'8px',borderTop:'2px solid var(--purple)'}},
      h('span',{style:{fontSize:'12px',fontWeight:700,color:'var(--purple)'}},m.name || mid),
      h('span',{id:'lane-status-'+mid.replace(/[^a-z0-9]/gi,'_'),style:{fontSize:'10px',color:'var(--fg3)',marginLeft:'auto'}},'thinking…'),
    );
    const toolEls = h('div',{style:{padding:'4px 10px'}});
    const body = h('div',{className:'bubble',style:{padding:'10px 14px',fontSize:'13px',lineHeight:'1.55',color:'var(--fg)',whiteSpace:'pre-wrap'}});
    const mentionsEl = h('div',{style:{padding:'0 10px'}});
    const verifyEl = h('div',{style:{padding:'0 10px 8px'}});
    const statsEl = h('div',{style:{padding:'6px 12px',borderTop:'1px solid var(--bg3)',fontSize:'10px',color:'var(--fg3)',fontFamily:'monospace',display:'none'}});
    lane.append(header, mentionsEl, toolEls, body, verifyEl, statsEl);
    grid.appendChild(lane);
    lanes[mid] = { lane, header, toolEls, body, mentionsEl, verifyEl, statsEl, statusSpan: header.querySelector('span[id^=lane-status-]'), tcs: [], text: '', done: false, stats: null };
  });

  // Persist history only from the user-side (no assistant msgs until we pick a canonical winner)
  state.msgs.push({role:'user', content});
  const history = state.msgs.filter(m => m.role==='user' || (m.role==='assistant' && m.content)).slice(0,-1).map(m => ({role:m.role, content:m.content}));

  const completions = {};
  let completedCount = 0;

  await Promise.all(models.map(async (modelId) => {
    const l = lanes[modelId];
    const setStatus = (txt) => { if (l.statusSpan) l.statusSpan.textContent = txt; };
    try {
      const response = await fetch('/api/chat/stream', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ message: content, model: modelId, impl: state.impl, history }),
      });
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let leftover = '';
      while (true) {
        const { done, value } = await reader.read();
        if (value) leftover += decoder.decode(value, { stream: true });
        if (done) leftover += decoder.decode();
        let idx;
        while ((idx = leftover.indexOf('\n\n')) !== -1) {
          const block = leftover.slice(0, idx);
          leftover = leftover.slice(idx + 2);
          let evt = null, data = null;
          for (const line of block.split('\n')) {
            if (line.startsWith('event: ')) evt = line.slice(7).trim();
            else if (line.startsWith('data: ')) data = line.slice(6);
          }
          if (!evt || !data) continue;
          let d; try { d = JSON.parse(data); } catch { continue; }
          if (evt === 'status') setStatus(d.type === 'calling_llm' ? 'calling…' : d.type);
          else if (evt === 'tool_call') {
            l.tcs.push({ name:d.name, args:d.args, impl:d.impl });
            setStatus('→ '+d.name);
            const tcEl = h('div',{style:{fontSize:'10px',color:'var(--fg3)',fontFamily:'monospace',padding:'2px 0'}},'→ '+d.name+'('+(Object.values(d.args||{})[0]||'').toString().slice(0,40)+')');
            l.toolEls.appendChild(tcEl);
          }
          else if (evt === 'tool_result') setStatus('thinking…');
          else if (evt === 'text_delta') { l.text += d.content; l.body.innerHTML = mdToHtml(l.text); attachCodeButtons(l.body); }
          else if (evt === 'text_done') {
            l.text = d.content || l.text;
            l.body.innerHTML = mdToHtml(l.text);
            attachCodeButtons(l.body);
            l.stats = d.stats;
            l.done = true;
            setStatus('done');
            if (d.stats) {
              l.statsEl.style.display = '';
              const costStr = d.stats.cost != null ? ' · $'+d.stats.cost.toFixed(6) : '';
              l.statsEl.textContent = fmt(d.stats.totalMs)+' · '+d.stats.toolCalls+' calls · '+d.stats.inTokens+'+'+d.stats.outTokens+' tok'+costStr;
            }
            completions[modelId] = d.stats?.totalMs || 999999;
            completedCount++;
          }
          else if (evt === 'mentions') {
            const bar = h('div',{style:{display:'flex',alignItems:'center',gap:'4px',padding:'4px 0',fontSize:'10px',color:'var(--purple)',fontWeight:600}},
              h('span',null,'📎'),
              ...(d.injected||[]).map(s => h('span',{style:{padding:'1px 6px',borderRadius:'8px',background:'rgba(139,92,246,.15)'}},'@'+s)),
              ...(d.missing||[]).map(s => h('span',{style:{padding:'1px 6px',borderRadius:'8px',background:'rgba(239,68,68,.15)',color:'#ef4444'}},'@'+s+' (no run)')),
            );
            l.mentionsEl.appendChild(bar);
          }
          else if (evt === 'verification') {
            const label = d.label || 'unverified';
            const color = label.includes('GROUNDED') ? 'var(--green)' : label.includes('LOW') ? '#f59e0b' : '#ef4444';
            l.verifyEl.innerHTML = '';
            l.verifyEl.appendChild(h('div',{style:{fontSize:'10px',fontWeight:700,color,padding:'4px 0'}},
              '🎯 '+label+(d.score != null ? ' · '+Math.round(d.score*100)+'%' : ''),
            ));
          }
          else if (evt === 'error') {
            l.body.textContent = 'Error: ' + (d.message || 'unknown');
            setStatus('error');
            l.done = true; completedCount++;
          }
        }
        if (done) break;
      }
    } catch (e) {
      l.body.textContent = 'Error: ' + e.message;
      setStatus('error');
    }
  }));

  // Crown the fastest
  const ids = Object.keys(completions);
  if (ids.length > 1) {
    const winnerId = ids.sort((a,b) => completions[a] - completions[b])[0];
    const winner = lanes[winnerId];
    if (winner) {
      winner.header.style.borderTop = '2px solid var(--green)';
      const crown = h('span',{style:{fontSize:'9px',fontWeight:700,color:'var(--green)',padding:'1px 6px',borderRadius:'5px',background:'rgba(34,197,94,.12)',marginLeft:'6px'}},'⚡ FASTEST');
      winner.header.insertBefore(crown, winner.header.lastChild);
    }
  }

  // Store the best (or first) response as the canonical assistant message in history
  const canonical = lanes[models[0]];
  state.msgs.push({ role:'assistant', content: canonical?.text || '', toolCalls: canonical?.tcs || [], stats: canonical?.stats, multi: true });
  refreshContextStrip();
}

async function runDirectSearch() {
  if (!searchState.pattern.trim()) return;
  // Show F1 loading animation
  const area = document.getElementById('search-results');
  if (area) {
    area.innerHTML = '<div style="padding:40px 24px;text-align:center">' +
      '<div class="f1-loader fast" style="width:200px;margin:0 auto 16px"></div>' +
      '<div style="display:flex;align-items:center;justify-content:center;gap:8px;color:var(--green);font-size:13px;font-weight:600">' +
      '<span class="f1-dots"><span></span><span></span><span></span><span></span></span>' +
      ' Milli-speed search' +
      '</div>' +
      '<div style="color:var(--fg3);font-size:11px;margin-top:6px">ripgrep → ' + (IMPLS[searchState.impl]?.icon||'') + ' ' + (IMPLS[searchState.impl]?.name||'') + ' MCP server</div>' +
      '</div>';
  }

  // Handle GitHub URL — clone first
  let searchPath = searchState.path || '';
  if (!searchPath && !searchState.repoUrl) {
    // Default: clone milli-agent if nothing specified
    searchState.repoUrl = 'https://github.com/walter-grace/milli-agent';
  }
  if (searchState.repoUrl) {
    const parsed = searchState.repoUrl.match(/github\.com\/([^\/\s]+\/[^\/\s]+)/);
    if (parsed) {
      if (area) {
        area.innerHTML = '<div style="padding:40px 24px;text-align:center">' +
          '<div class="f1-loader" style="width:240px;margin:0 auto 16px"></div>' +
          '<div style="color:var(--fg2);font-size:13px;font-weight:500">Cloning ' + parsed[1] + '...</div>' +
          '<div style="color:var(--fg3);font-size:11px;margin-top:4px">This may take a few seconds for new repos</div></div>';
      }
      try {
        const resp = await fetch('/api/clone', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({repo:parsed[1]}) });
        const d = await resp.json();
        if (d.path) searchPath = d.path;
      } catch {}
      // Switch back to search animation
      if (area) {
        area.innerHTML = '<div style="padding:40px 24px;text-align:center">' +
          '<div class="f1-loader fast" style="width:200px;margin:0 auto 16px"></div>' +
          '<div style="color:var(--green);font-size:13px;font-weight:600"><span class="f1-dots"><span></span><span></span><span></span><span></span></span> Searching cloned repo</div></div>';
      }
    }
  }

  searchState.analysis = '';
  searchState.analyzing = false;
  const resp = await fetch('/api/search/direct', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ pattern:searchState.pattern, path:searchPath, impl:searchState.impl, max_results:200 }),
  });
  searchState.results = await resp.json();

  const resultsEl = document.getElementById('search-results');
  if (resultsEl) renderSearchResults(resultsEl);
}

async function runAnalysis() {
  if (!searchState.results || searchState.analyzing) return;
  searchState.analyzing = true;

  // Re-render to show "Analyzing..." button
  const analyzeArea = document.getElementById('search-results');
  if (analyzeArea) renderSearchResults(analyzeArea);

  try {
    const resp = await fetch('/api/search/analyze', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        pattern: searchState.results.pattern,
        results: searchState.results.lines.slice(0, 50).join('\n'),
        model: state.model,
      }),
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '', text = '';

    while (true) {
      const { done, value } = await reader.read();
      if (!done) buffer += decoder.decode(value, { stream:true });
      else buffer += decoder.decode();
      const lines = buffer.split('\n');
      buffer = done ? '' : lines.pop();
      let evt = null;
      for (const line of lines) {
        if (line.startsWith('event: ')) evt = line.slice(7).trim();
        else if (line.startsWith('data: ') && evt) {
          try {
            const d = JSON.parse(line.slice(6));
            if (evt === 'text_delta') {
              text += d.content;
              searchState.analysis = text;
              const _el2 = document.getElementById('search-analysis');
              if (_el2) _el2.lastChild.textContent = text;
              else { const a2 = document.getElementById('search-results'); if (a2) renderSearchResults(a2); }
            }
            if (evt === 'text_done') { searchState.analysis = d.content; if(d.cost) state.sessionCost += d.cost; refreshNav(); }
          } catch {}
          evt = null;
        }
      }
      if (done) break;
    }
  } catch (err) {
    searchState.analysis = 'Error: ' + err.message;
  }
  searchState.analyzing = false;
  const finalArea = document.getElementById('search-results');
  if (finalArea) renderSearchResults(finalArea);
}

      const resp = await fetch('/api/clone', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ repo: parsed[1] }) });
      const d = await resp.json();
      if (d.path) { apiState.specPath = d.path; apiState.specName = parsed[1]; apiState.uploaded = true; fileLabel.textContent = parsed[1]; fileLabel.style.borderColor = 'var(--green)'; }

  queryInput.placeholder = 'Search query (endpoint, schema, keyword)...';
  queryInput.value = apiState.query;
  queryInput.style.flex = '1';
  queryInput.addEventListener('input', e => apiState.query = e.target.value);
  queryInput.addEventListener('keydown', e => { if (e.key === 'Enter') runAPISearch(); });

  ['endpoints','schemas','search','detail'].forEach(m => {

    if (m === apiState.mode) opt.selected = true;
    modeSelect.appendChild(opt);
  });
  modeSelect.addEventListener('change', e => apiState.mode = e.target.value);

  const searchBtn = h('button',{className:'sbtn',onClick:runAPISearch}, apiState.searching ? 'Searching...' : 'Search');

  top.appendChild(searchRow);

  // Preset specs
  const presets = h('div',{style:{display:'flex',flexWrap:'wrap',gap:'6px'}});

    ['Cloudflare API','cloudflare/api-schemas'],
    ['GitHub API','github/rest-api-description'],
    ['Stripe API','stripe/openapi'],
  ].forEach(([label, repo]) => {
    presets.appendChild(h('button',{className:'pre',onClick:async ()=>{
      fileLabel.textContent = 'Cloning ' + repo + '...';

      const d = await resp.json();
